<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Studio Bridge | Ultra-Expert 4K AI</title>
    <style>
        :root {
            --bg: #020408; --panel: #0a0c14; --accent: #00d4ff; --neon: #00ffa2;
            --purple: #bf61ff; --text: #e1e4f5; --glass: rgba(255, 255, 255, 0.03);
        }
        body { background: var(--bg); color: var(--text); font-family: 'Consolas', monospace; display: flex; height: 100vh; margin: 0; overflow: hidden; }
        
        /* 4K UI Elements */
        .glass-panel { background: var(--panel); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; backdrop-filter: blur(20px); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        .sidebar { width: 350px; border-right: 1px solid var(--glass); display: flex; flex-direction: column; padding: 20px; gap: 15px; }
        .editor-container { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        /* Expert Toolbar */
        .toolbar { height: 60px; background: var(--panel); display: flex; align-items: center; padding: 0 20px; gap: 20px; border-bottom: 1px solid var(--glass); }
        .btn-expert { background: var(--accent); color: #000; padding: 10px 20px; border-radius: 6px; font-weight: 900; cursor: pointer; border: none; transition: 0.3s; text-transform: uppercase; font-size: 11px; }
        .btn-expert:hover { background: #fff; box-shadow: 0 0 20px var(--accent); }
        
        #editor { flex: 1; background: transparent; border: none; padding: 30px; color: #d4d4d4; font-size: 14px; outline: none; resize: none; line-height: 1.6; }
        .status-light { width: 10px; height: 10px; border-radius: 50%; background: var(--neon); box-shadow: 0 0 10px var(--neon); }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="font-size: 12px; letter-spacing: 3px; color: var(--accent);">STUDIO BRIDGE v9.0</h2>
    
    <div class="glass-panel" style="padding: 15px;">
        <p style="font-size: 10px; color: var(--purple);">EXPERT BUNDLES</p>
        <button class="btn-expert" style="width: 100%; margin-top: 5px;" onclick="loadBundle('AdminCMD')">Generate Admin System</button>
        <button class="btn-expert" style="width: 100%; margin-top: 5px; background: var(--purple);" onclick="loadBundle('NPCAI')">Expert NPC Combat</button>
        <button class="btn-expert" style="width: 100%; margin-top: 5px; background: var(--neon);" onclick="loadBundle('4KUI')">4K Lemonade UI</button>
    </div>

    <div style="flex: 1; overflow-y: auto; font-size: 11px; color: #888;" id="log-feed">
        [SYSTEM]: Awaiting High-Level Directives...
    </div>

    <textarea id="ai-input" class="glass-panel" style="width: 100%; height: 100px; color: white; padding: 10px;" placeholder="Describe an advanced system..."></textarea>
    <button class="btn-expert" onclick="processExpertRequest()">Execute Neural Link</button>
</div>

<div class="editor-container">
    <div class="toolbar">
        <div class="status-light"></div>
        <div style="font-size: 10px; color: var(--neon);">LINK STATUS: SECURE</div>
        <div style="margin-left: auto; display: flex; gap: 10px;">
            <button class="btn-expert" style="background: transparent; border: 1px solid var(--accent); color: var(--accent);" onclick="toggleMode('Server')">SERVER</button>
            <button class="btn-expert" style="background: transparent; border: 1px solid var(--accent); color: var(--accent);" onclick="toggleMode('Local')">CLIENT</button>
            <button class="btn-expert" onclick="deployBundle()">DEPLOY 4K BUNDLE</button>
        </div>
    </div>
    <textarea id="editor" spellcheck="false">-- EXPERT SCRIPT ENGINE READY</textarea>
</div>

<script>
let currentBundle = { name: "NewPackage", scripts: [], assets: [] };

function loadBundle(type) {
    const feed = document.getElementById('log-feed');
    feed.innerHTML += `<div>[AI]: Constructing ${type} architecture...</div>`;
    
    if (type === 'AdminCMD') {
        currentBundle = {
            name: "ExpertAdmin_CMD",
            is4K: true,
            scripts: [
                { name: "MainServer", type: "Script", parent: "ServerScriptService", source: "-- Expert Server Auth\nlocal Remote = Instance.new('RemoteEvent', game.ReplicatedStorage)\nRemote.Name = 'AdminRemote'\n-- Advanced Permission Logic..." },
                { name: "CMD_Client", type: "LocalScript", parent: "StarterPlayerScripts", source: "-- 4K CMD UI Logic\nlocal Remote = game.ReplicatedStorage:WaitForChild('AdminRemote')\n-- TweenService UI Animations..." },
                { name: "CommandLibrary", type: "ModuleScript", parent: "ReplicatedStorage", source: "local Lib = {}\nLib.Commands = {['kill'] = function() end}\nreturn Lib" }
            ]
        };
        document.getElementById('editor').value = currentBundle.scripts[0].source;
    }
}

async function deployBundle() {
    const status = document.querySelector('.status-light');
    status.style.background = "orange";
    
    // Better Auto-Insert: Sending a complete JSON object instead of just text
    const payload = {
        action: "DEPLOY_BUNDLE",
        data: currentBundle
    };

    try {
        const response = await fetch('http://localhost:8080/deploy', {
            method: 'POST',
            body: JSON.stringify(payload),
            headers: {'Content-Type': 'application/json'}
        });
        
        if(response.ok) {
            status.style.background = "var(--neon)";
            document.getElementById('log-feed').innerHTML += `<div style="color:var(--neon)">[SUCCESS]: Full Bundle Deployed.</div>`;
        }
    } catch(e) {
        status.style.background = "red";
    }
}
</script>
</body>
</html>
