<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>NEXUS — Roblox AI</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Syne:wght@800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#020408;--bg2:#080d18;--bg3:#0d1525;--bg4:#121c30;
  --c:#00c8ff;--c2:#0090bb;--cglow:rgba(0,200,255,0.2);
  --g:#00ffaa;--gdim:rgba(0,255,170,0.1);--gglow:rgba(0,255,170,0.3);
  --r:#ff3355;--rdim:rgba(255,51,85,0.1);
  --o:#ffaa00;
  --p:#cc44ff;--pdim:rgba(204,68,255,0.12);--pglow:rgba(204,68,255,0.35);
  --text:#d0e8ff;--text2:#4a6a88;--text3:#1e3045;
  --rblx:#e31e25;
  --ff:'JetBrains Mono',monospace;--ffd:'Syne',sans-serif;
  --r8:8px;--r12:12px;--r20:20px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--ff);font-size:13px;overflow:hidden}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:var(--bg4)}

/* BG */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,200,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,0.04) 1px,transparent 1px);background-size:40px 40px}
.bg-g1{position:absolute;top:-30%;left:-20%;width:70%;height:70%;background:radial-gradient(ellipse,rgba(0,200,255,0.05) 0%,transparent 60%);animation:df1 20s ease-in-out infinite alternate}
.bg-g2{position:absolute;bottom:-30%;right:-20%;width:60%;height:60%;background:radial-gradient(ellipse,rgba(204,68,255,0.05) 0%,transparent 60%);animation:df2 25s ease-in-out infinite alternate}
@keyframes df1{to{transform:translate(8%,5%) scale(1.15)}}
@keyframes df2{to{transform:translate(-6%,-8%) scale(1.2)}}

#root{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column}

/* AUTH */
#auth{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:var(–bg)}
#auth.gone{display:none}
.auth-logo{font-family:var(–ffd);font-size:36px;font-weight:900;color:var(–c);margin-bottom:4px;display:flex;align-items:center;gap:10px}
.auth-pip{width:12px;height:12px;background:var(–c);border-radius:50%;box-shadow:0 0 20px var(–c);animation:pip 2s ease-in-out infinite}
@keyframes pip{0%,100%{box-shadow:0 0 15px var(–c)}50%{box-shadow:0 0 30px var(–c),0 0 60px var(–cglow)}}
.auth-sub{font-size:11px;color:var(–text2);margin-bottom:24px;letter-spacing:.1em;text-transform:uppercase}
.auth-card{background:var(–bg2);border:0.5px solid rgba(0,200,255,0.15);border-radius:var(–r12);padding:24px;width:100%;max-width:400px;position:relative;overflow:hidden}
.auth-card::before{content:’’;position:absolute;top:0;inset-x:0;height:1px;background:linear-gradient(90deg,transparent,var(–c),transparent);opacity:.5}
.auth-card h2{font-family:var(–ffd);font-size:18px;font-weight:800;margin-bottom:6px}
.auth-card p{font-size:12px;color:var(–text2);margin-bottom:20px;line-height:1.7}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;color:var(–text2);margin-bottom:6px;letter-spacing:.1em;text-transform:uppercase}
.field input{width:100%;background:var(–bg3);border:0.5px solid rgba(0,200,255,0.15);border-radius:var(–r8);padding:12px 14px;font-family:var(–ff);font-size:14px;color:var(–text);outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
.field input:focus{border-color:var(–c);box-shadow:0 0 0 2px var(–cglow)}
.field input::placeholder{color:var(–text3)}
.anote{font-size:12px;color:var(–text2);background:var(–bg3);border:0.5px solid var(–bg4);border-radius:var(–r8);padding:12px;margin-bottom:14px;line-height:1.8}
.anote code{background:var(–bg4);border-radius:3px;padding:1px 6px;color:var(–c);font-size:11px}
.abtn{width:100%;background:var(–c);color:#020408;border:none;border-radius:var(–r8);padding:14px;font-family:var(–ffd);font-weight:800;font-size:13px;letter-spacing:.05em;cursor:pointer;transition:all .15s;text-transform:uppercase;-webkit-appearance:none}
.abtn:active{transform:scale(.97)}
.abtn:hover{background:var(–c2);box-shadow:0 0 24px var(–cglow)}
.abtn.rblx{background:var(–rblx);color:white}
.abtn.rblx:hover{background:#c01920}
.abtn.ghost{background:var(–bg3);color:var(–text2);border:0.5px solid rgba(0,200,255,0.15)}
.abtn.ghost:hover{border-color:var(–c);color:var(–c);box-shadow:none}
.aerr{color:var(–r);font-size:12px;margin-top:8px;display:none;line-height:1.5}
.astep{display:none}.astep.on{display:block}
.rbxrow{background:var(–bg3);border:0.5px solid var(–bg4);border-radius:var(–r8);padding:14px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.s3img{width:48px;height:48px;border-radius:50%;object-fit:cover;background:var(–rblx);flex-shrink:0;border:2px solid var(–c)}
.skip-link{display:block;text-align:center;margin-top:12px;font-size:11px;color:var(–text2);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:var(–ff);width:100%}

/* APP */
#app{display:none;height:100vh;flex-direction:column}
#app.show{display:flex}

/* TOPBAR */
.topbar{height:54px;background:rgba(2,4,8,0.95);backdrop-filter:blur(12px);border-bottom:0.5px solid var(–bg3);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;position:relative;z-index:10}
.topbar::after{content:’’;position:absolute;bottom:0;inset-x:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,200,255,0.2),transparent)}
.t-logo{font-family:var(–ffd);font-size:18px;font-weight:900;color:var(–c);display:flex;align-items:center;gap:7px}
.t-pip{width:7px;height:7px;background:var(–c);border-radius:50%;box-shadow:0 0 10px var(–c);animation:pip 2s ease-in-out infinite;flex-shrink:0}
.t-conn{display:flex;align-items:center;gap:6px;padding:5px 10px;background:var(–bg2);border:0.5px solid var(–bg3);border-radius:20px;font-size:10px;color:var(–text2);margin-left:auto}
.t-dot{width:5px;height:5px;border-radius:50%;background:var(–text3);flex-shrink:0;transition:all .3s}
.t-dot.on{background:var(–g);box-shadow:0 0 8px var(–gglow)}
.t-dot.wait{background:var(–o);animation:blink 1.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.t-user{display:flex;align-items:center;gap:8px;padding:4px 10px;background:var(–bg2);border:0.5px solid var(–bg3);border-radius:var(–r8)}
.t-avatar{width:26px;height:26px;border-radius:50%;object-fit:cover;background:var(–rblx);flex-shrink:0}
.t-uname{font-size:11px;color:var(–text);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.t-logout{color:var(–text3);font-size:12px;margin-left:2px;cursor:pointer;flex-shrink:0}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* INPUT ZONE */
.input-zone{padding:14px 14px 10px;flex-shrink:0;background:var(–bg)}
.input-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.input-title{font-family:var(–ffd);font-size:15px;font-weight:800;display:flex;align-items:center;gap:7px}
.input-pip{width:7px;height:7px;border-radius:50%;background:var(–g);box-shadow:0 0 10px var(–gglow);animation:pip 2s ease-in-out infinite}
.conn-badge{display:flex;align-items:center;gap:5px;padding:4px 9px;background:var(–bg2);border:0.5px solid var(–bg3);border-radius:20px;font-size:10px;color:var(–text2)}

/* THE ONE INPUT */
.cmd-box{background:var(–bg2);border:0.5px solid rgba(0,200,255,0.15);border-radius:var(–r12);padding:14px;margin-bottom:10px;transition:border-color .2s,box-shadow .2s;position:relative}
.cmd-box:focus-within{border-color:var(–g);box-shadow:0 0 0 2px var(–gdim),0 0 20px var(–gdim)}
.cmd-textarea{width:100%;background:transparent;border:none;outline:none;font-family:var(–ff);font-size:14px;color:var(–text);resize:none;line-height:1.6;min-height:90px;max-height:160px;-webkit-appearance:none}
.cmd-textarea::placeholder{color:var(–text3)}
.cmd-hint{font-size:10px;color:var(–text3);margin-top:6px;line-height:1.5}

/* AI STATE */
.ai-state{margin-bottom:10px;display:none;flex-direction:column;gap:6px}
.ai-state.on{display:flex}
.ai-think{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(–gdim);border:0.5px solid rgba(0,255,170,0.2);border-radius:var(–r8);font-size:12px;color:var(–g)}
.dots{display:flex;gap:3px}
.dots i{width:5px;height:5px;background:var(–g);border-radius:50%;animation:dot 1s ease-in-out infinite;display:block}
.dots i:nth-child(2){animation-delay:.18s}.dots i:nth-child(3){animation-delay:.36s}
@keyframes dot{0%,100%{transform:scale(.5);opacity:.4}50%{transform:scale(1);opacity:1}}
.ai-preview{background:var(–bg2);border:0.5px solid rgba(0,255,170,0.2);border-radius:var(–r8);overflow:hidden}
.ai-preview-head{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(–gdim);border-bottom:0.5px solid rgba(0,255,170,0.1)}
.ai-preview-lbl{font-size:10px;color:var(–g);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.ai-preview-code{padding:10px 12px;font-size:11px;color:var(–text2);white-space:pre-wrap;word-break:break-all;max-height:120px;overflow-y:auto;line-height:1.6}
.ai-preview-note{padding:8px 12px;border-top:0.5px solid var(–bg3);font-size:11px;color:var(–text2);line-height:1.5}

/* ACTIONS */
.actions{display:flex;gap:8px;margin-bottom:10px}
.btn{border:0.5px solid var(–bg3);border-radius:var(–r8);padding:10px 14px;font-family:var(–ff);font-size:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;white-space:nowrap;-webkit-appearance:none;font-weight:700}
.btn:active{transform:scale(.97)}
.btn.clear{background:var(–bg2);color:var(–text2)}
.btn.clear:hover{border-color:var(–r);color:var(–r)}
.btn.retry{background:var(–bg2);color:var(–text2);display:none}
.btn.go{background:var(–g);color:#020408;border-color:var(–g);margin-left:auto;flex:1;justify-content:center}
.btn.go:hover{background:#00dd88;box-shadow:0 0 20px var(–gglow)}
.btn.send{background:var(–c);color:#020408;border-color:var(–c);margin-left:auto;flex:1;justify-content:center}
.btn.send:hover{background:var(–c2);box-shadow:0 0 20px var(–cglow)}
.btn:disabled{background:var(–bg3) !important;color:var(–text3) !important;border-color:var(–bg3) !important;cursor:not-allowed !important;box-shadow:none !important;transform:none !important}

/* QUICK FIRE */
.qf{border-top:0.5px solid var(–bg3);flex-shrink:0;background:var(–bg)}
.qf-tabs{display:flex;overflow-x:auto;padding:8px 14px 0;gap:2px;-webkit-overflow-scrolling:touch}
.qf-tabs::-webkit-scrollbar{display:none}
.qf-tab{padding:6px 12px;font-size:11px;color:var(–text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:var(–ff);font-weight:700;flex-shrink:0;transition:all .15s}
.qf-tab.on{color:var(–g);border-bottom-color:var(–g)}
.qf-grid{display:flex;flex-wrap:nowrap;overflow-x:auto;gap:6px;padding:8px 14px;-webkit-overflow-scrolling:touch}
.qf-grid::-webkit-scrollbar{display:none}
.qf-btn{background:var(–bg2);border:0.5px solid var(–bg3);color:var(–text2);border-radius:20px;padding:6px 12px;font-size:11px;cursor:pointer;font-family:var(–ff);white-space:nowrap;flex-shrink:0;transition:all .15s;font-weight:700}
.qf-btn:active{transform:scale(.95)}
.qf-btn:hover{border-color:var(–g);color:var(–g);background:var(–gdim)}

/* LOG */
.log-zone{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.log-head{padding:8px 14px;border-top:0.5px solid var(–bg3);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(–bg)}
.log-title{font-size:10px;font-weight:700;color:var(–text2);letter-spacing:.1em;text-transform:uppercase}
.log-inner{flex:1;overflow-y:auto;padding:8px 14px;display:flex;flex-direction:column;gap:5px;-webkit-overflow-scrolling:touch}
.le{padding:8px 10px;border-radius:var(–r8);font-size:12px;border-left:2px solid var(–text3);background:var(–bg2);animation:lein .15s ease}
@keyframes lein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.le.ai{border-left-color:var(–g)}.le.sent{border-left-color:var(–c)}.le.ok{border-left-color:var(–g)}.le.err{border-left-color:var(–r)}.le.sys{border-left-color:var(–text3)}
.le-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.le-tag{font-size:9px;padding:1px 6px;border-radius:3px;font-weight:700;text-transform:uppercase}
.le-tag.ai{background:var(–gdim);color:var(–g)}.le-tag.sent{background:rgba(0,200,255,0.08);color:var(–c)}.le-tag.ok{background:var(–gdim);color:var(–g)}.le-tag.err{background:var(–rdim);color:var(–r)}.le-tag.sys{background:var(–bg3);color:var(–text3)}
.le-time{font-size:10px;color:var(–text3);margin-left:auto}
.le-body{color:var(–text2);font-size:11px;line-height:1.5;word-break:break-all}

/* EXAMPLES */
.examples-row{border-top:0.5px solid var(–bg3);flex-shrink:0;background:var(–bg);padding:8px 0}
.ex-scroll{display:flex;gap:6px;overflow-x:auto;padding:0 14px;-webkit-overflow-scrolling:touch}
.ex-scroll::-webkit-scrollbar{display:none}
.ex-btn{background:var(–bg2);border:0.5px solid var(–bg3);color:var(–text2);border-radius:20px;padding:7px 13px;font-size:11px;cursor:pointer;font-family:var(–ff);white-space:nowrap;flex-shrink:0;transition:all .15s;font-weight:700;line-height:1}
.ex-btn:active{transform:scale(.95)}
.ex-btn:hover{border-color:var(–g);color:var(–g);background:var(–gdim)}

/* TOAST */
#toasts{position:fixed;bottom:20px;left:14px;right:14px;display:flex;flex-direction:column;gap:6px;z-index:999;pointer-events:none}
.toast{background:var(–bg2);border:0.5px solid var(–bg3);border-radius:var(–r8);padding:10px 14px;font-size:12px;animation:tin .2s ease;pointer-events:auto}
.toast.ok{border-left:2px solid var(–g)}.toast.bad{border-left:2px solid var(–r)}.toast.info{border-left:2px solid var(–c)}.toast.ai{border-left:2px solid var(–g)}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(2,4,8,0.9);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(–bg2);border:0.5px solid rgba(0,200,255,0.15);border-radius:var(–r12) var(–r12) 0 0;padding:20px;width:100%;max-width:500px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);position:relative}
.modal::before{content:’’;position:absolute;top:0;inset-x:0;height:1px;background:linear-gradient(90deg,transparent,var(–c),transparent);opacity:.4}
.overlay.open .modal{transform:translateY(0)}
.modal-pill{width:36px;height:4px;background:var(–bg4);border-radius:2px;margin:0 auto 16px}
.modal-title{font-family:var(–ffd);font-size:16px;font-weight:800;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(–text2);margin-bottom:16px}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.modal-btns .btn{flex:1;justify-content:center}

/* CONNECTION PANEL (hidden on mobile, shown on wider) */
.side-conn{display:none}
@media(min-width:768px){
.main{flex-direction:row}
.left-col{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:0.5px solid var(–bg3)}
.side-conn{display:flex;flex-direction:column;width:280px;overflow-y:auto;padding:14px;gap:10px}
.conn-card{background:var(–bg2);border:0.5px solid var(–bg3);border-radius:var(–r12);padding:14px}
.conn-card-title{font-size:10px;font-weight:700;color:var(–text2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.bigdot{width:10px;height:10px;border-radius:50%;background:var(–text3);flex-shrink:0;transition:all .3s}
.bigdot.on{background:var(–g);box-shadow:0 0 10px var(–gglow)}
.bigdot.wait{background:var(–o);animation:blink 1.2s ease-in-out infinite}
.conn-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.conn-name{font-family:var(–ffd);font-size:13px;font-weight:800}
.conn-desc{font-size:11px;color:var(–text2);line-height:1.5}
.tok-row{background:var(–bg3);border:0.5px solid var(–bg4);border-radius:var(–r8);padding:8px 10px;display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:8px}
.tok-lbl{font-size:9px;color:var(–text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
.tok-val{font-size:11px;color:var(–c);letter-spacing:.06em;word-break:break-all}
.cpybtn{font-size:10px;color:var(–text3);cursor:pointer;padding:2px 7px;border:0.5px solid var(–bg4);border-radius:3px;background:none;font-family:var(–ff);flex-shrink:0}
.cpybtn:hover{border-color:var(–c);color:var(–c)}
.setup-steps{background:var(–bg2);border:0.5px solid var(–bg3);border-radius:var(–r12);padding:14px}
.setup-step{display:flex;gap:8px;margin-bottom:10px;align-items:flex-start}
.step-num{width:18px;height:18px;border-radius:50%;background:var(–bg3);border:0.5px solid var(–bg4);font-size:10px;color:var(–text3);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-title{font-size:12px;color:var(–text);font-weight:700;margin-bottom:2px}
.step-desc{font-size:11px;color:var(–text2);line-height:1.5}
.step-desc code{background:var(–bg3);border-radius:3px;padding:1px 5px;color:var(–c);font-size:10px}
.step-code{background:var(–bg3);border-radius:var(–r8);padding:6px 8px;margin-top:4px;font-size:10px;color:var(–c);word-break:break-all;position:relative;padding-right:48px}
.qf-grid{flex-wrap:wrap}
}
</style>

</head>

<script>

/* ══ SYSTEM PROMPT ══ */
const SYS=`You are NEXUS — the most advanced Roblox Studio AI ever built. You are a world-class expert in every aspect of Roblox: photorealistic 4K terrain, stunning animated GUIs, complex multi-script systems, advanced Lua OOP, 3D model building, cinematic lighting, physics, networking, datastores, pathfinding, and every Roblox API.

EXECUTION CONTEXT: Code runs in a Roblox Studio plugin command bar context. Direct access to all services, workspace.Terrain, Instance, Vector3, CFrame, Color3, BrickColor, UDim2, Enum, math, task.

ABSOLUTE RULES:
1. ALWAYS 100% complete. Zero placeholders. Zero TODOs.
2. task.wait() not wait(). task.spawn() not spawn(). game:GetService() always.
3. Parent set LAST on every instance.
4. LocalScripts: Instance.new("LocalScript"), full .Source, parent to StarterPlayerScripts or StarterGui or StarterCharacterScripts.
5. Scripts: Instance.new("Script"), full .Source, parent to ServerScriptService or inside a Part.
6. NEVER mix server and client. Server=Script, Client=LocalScript, Shared=ModuleScript in ReplicatedStorage.
7. RemoteEvents always in ReplicatedStorage. FireServer from LocalScript. OnServerEvent on Script.
8. DataStore always pcall. Key by player.UserId.
9. For multi-script systems: generate ALL scripts in sequence, each as a full instance with complete .Source.

PHOTOREALISTIC 4K TERRAIN:
- Layer materials: LeafyGrass top, Mud under hills, Rock cliffs, Sand beaches, Snow peaks, Basalt volcanic, Limestone caves
- FillBall for organic shapes, FillBlock for flat, FillCylinder for pillars/trunks
- Carve with Enum.Material.Air for caves/craters/rivers
- ALWAYS add Atmosphere: Density, Offset, Color, Decay, Glare, Haze
- ALWAYS add Lighting: ClockTime, Brightness, Ambient, OutdoorAmbient, FogColor, FogEnd
- ALWAYS add post-processing: Bloom(Intensity,Size,Threshold), ColorCorrection(Brightness,Contrast,Saturation), DepthOfField, SunRaysEffect
- Add Sky instance with StarCount
- Natural variation with math.random() offsets in loops
- For islands: grass FillBall core + sand FillBall ring + water FillBlock ocean + rock cliff edges
- For mountains: stacked FillBall calls, snow cap, rock mid, grass base + atmosphere haze
- For forests: FillCylinder trunks, FillBall canopy, vary heights/positions

BEAUTIFUL GUI/UI:
- UICorner on EVERYTHING for rounded corners
- UIStroke for glowing borders (Color, Thickness, Transparency)
- UIGradient for gradient fills on frames (ColorSequence, Rotation)
- TweenService for ALL animations: slide in, scale on hover, fade
- UIListLayout/UIGridLayout with Padding
- UIPadding on all containers
- TextScaled=true with UITextSizeConstraint
- Dark pro theme: bg=Color3.fromRGB(8,10,20), panel=Color3.fromRGB(12,16,28), accent=Color3.fromRGB(0,180,255)
- Button hover: TweenService scale 1.05 + color brighten
- ScrollingFrame with AutomaticCanvasSize=Y, ScrollBarThickness=4
- Slide-in: start off-screen, tween to position with Back easing
- ViewportFrame with WorldModel for 3D previews inside GUI
- ClipsDescendants=true on containers
- ZIndexBehavior=Sibling on ScreenGui

3D MODELS:
- Model with PrimaryPart set
- SpecialMesh for custom shapes
- WeldConstraint to join parts
- SurfaceAppearance for PBR textures
- CFrame math for rotations: CFrame.new(pos)*CFrame.Angles(rx,ry,rz)
- ParticleEmitter for effects
- PointLight/SpotLight for glow
- Beam between Attachments for energy effects

ADVANCED SCRIPTING:
- OOP: local Class={} Class.__index=Class function Class.new() local self=setmetatable({},Class) return self end return Class
- Debounce: local db={} obj.Touched:Connect(function(h) if db[h] then return end db[h]=true task.wait(1) db[h]=nil end)
- Pathfinding: PathfindingService:CreatePath({AgentRadius=2,AgentHeight=5,AgentCanJump=true}), ComputeAsync, GetWaypoints, MoveTo loop
- Ragdoll: BallSocketConstraint at each joint, unanchor parts
- Camera: workspace.CurrentCamera.CameraType=Enum.CameraType.Scriptable, CFrame each RenderStepped
- Anti-cheat: server-side validate ALL RemoteEvent inputs with sanity checks

UNDERSTOOD SLANG: baseplate=512x512 grass Part, obby=obstacle course, tycoon=plot building game, FE=RemoteEvents, hitbox=detection Part, god=MaxHealth=math.huge, fly=BodyVelocity+BodyGyro, noclip=CanCollide false loop, speed=WalkSpeed, jump=JumpPower, admin=chat commands, leaderstats=Folder in player, NPC=Model with Humanoid, pet=following model, shop=GUI+RemoteEvent+currency, tool=Tool in StarterPack, gamepass=MarketplaceService, premium=player.MembershipType

RESPONSE: ONLY this JSON, no markdown, no backticks:
{"lua":"complete executable code with \\n for newlines","explanation":"2-3 sentences: what was built, where scripts go, important notes."}`;

function initExamples(){
  const el=$('exscroll');
  if(!el)return;
  el.innerHTML=EXAMPLES.map(e=>`<button class="ex-btn" onclick="exFire(${JSON.stringify(e.p)})">${e.l}</button>`).join('');

function exFire(p){$('cmd-in').value=p;handleMain();}

/* ══ Main flow ══ */
async function handleMain(){
  if(codeReady){await sendCode();}
  else{await generate();}
}

const THINKS=['Analyzing your idea…','Crafting expert Lua…','Building your world…','Writing scripts…','Generating terrain…','Polishing code…','Almost done…'];

async function generate(){
  const prompt=$('cmd-in').value.trim();
  if(!prompt){toast('Tell NEXUS what to build!','bad');return;}
  $('aistate').classList.add('on');
  $('aithink').style.display='flex';
  $('aiprev').style.display='none';
  $('mainbtn').disabled=true;$('mainbtn').textContent='✦ Thinking…';
  $('retrybtn').style.display='none';
  $('cmd-hint').textContent='NEXUS is generating your code…';
  let ti=0;
  const tint=setInterval(()=>{$('thinktxt').textContent=THINKS[ti++%THINKS.length];},800);
  addLog('ai','request',`"${prompt}"`);
  try{
    const res=await fetch(BACKEND+'/api/ai',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt,system:SYS})
    });
    clearInterval(tint);
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||'Server error');
    const raw=data.content[0].text;
    let parsed;
    try{parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());}
    catch{parsed={lua:raw,explanation:'Generated Lua code.'};}
    genCode=parsed.lua;
    $('aithink').style.display='none';
    $('aiprev').style.display='block';
    $('aicode').textContent=genCode;
    $('ainote').textContent='💡 '+parsed.explanation;
    codeReady=true;
    $('mainbtn').disabled=false;$('mainbtn').textContent='▶ Send to Studio';
    $('mainbtn').className='btn send';
    $('retrybtn').style.display='flex';
    $('cmd-hint').textContent='Code ready! Tap Send to run it in Studio.';
    addLog('ai','generated',parsed.explanation);
    toast('✦ Ready — tap Send!','ai');
  }catch(e){
    clearInterval(tint);
    $('aithink').style.display='none';
    $('aistate').classList.remove('on');
    $('mainbtn').disabled=false;$('mainbtn').textContent='✦ Generate & Send';$('mainbtn').className='btn go';
    $('cmd-hint').textContent='Powered by Groq AI — free & instant ⚡';
    addLog('err','ai-fail',e.message);
    toast('Error: '+e.message,'bad');
  }
}

async function sendCode(){
  if(!genCode)return;
  addLog('sent','lua',genCode.substring(0,80)+(genCode.length>80?'…':''));
  $('mainbtn').disabled=true;$('mainbtn').textContent='Sending…';
  try{
    const r=await fetch(BACKEND+'/api/command',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,type:'run_script',body:genCode})});
    const d=await r.json();
    if(!d.ok)throw new Error(d.error||'Server error');
    let result=null;
    for(let i=0;i<15;i++){
      await new Promise(r=>setTimeout(r,1000));
      const rr=await fetch(BACKEND+'/api/result/'+token);
      const rd=await rr.json();
      if(rd.ready){result=rd;break;}
    }
    if(result){addLog(result.success?'ok':'err','result',result.output||'Done.');toast(result.success?'✅ Done! Check Studio.':'❌ Studio error.',result.success?'ok':'bad');}
    else{addLog('err','timeout','No response — is plugin connected?');toast('No response from Studio.','bad');}
  }catch(e){addLog('err','send',e.message);toast('Failed: '+e.message,'bad');}
  resetState();
}

function resetState(){
  $('mainbtn').disabled=false;$('mainbtn').textContent='✦ Generate & Send';$('mainbtn').className='btn go';
  $('retrybtn').style.display='none';
  $('aiprev').style.display='none';$('aithink').style.display='none';
  $('aistate').classList.remove('on');
  $('cmd-in').value='';
  $('cmd-hint').textContent='Powered by Groq AI — free & instant ⚡';
  genCode=null;codeReady=false;
}
async function retry(){codeReady=false;genCode=null;$('mainbtn').textContent='✦ Generate & Send';$('mainbtn').className='btn go';await generate();}
function clearAll(){resetState();}
function copyCode(){if(genCode){navigator.clipboard.writeText(genCode).catch(()=>{});toast('Copied!','ok');}}

/* ══ AUTH ══ */
async function s1next(){
  const u=$('rbx-user').value.trim();
  if(!u){$('s1err').style.display='block';return;}
  $('s1err').style.display='none';
  const btn=$('s1btn');
  btn.textContent='Loading profile…';btn.disabled=true;

  // Try to fetch real Roblox profile — no verification needed
  let username=u, displayName=u, avatarUrl='', userId=null;
  try{
    const ud=await getRobloxUser(u);
    if(ud){
      userId=ud.userId;
      username=ud.username||u;
      displayName=ud.displayName||u;
      const av=await getRobloxAvatar(ud.userId);
      if(av)avatarUrl=av;
    }
  }catch{}

  user={username,userId,avatarUrl,av:username[0].toUpperCase()};
  token=rndT()+rndT();
  $('s3t').textContent='Welcome, '+displayName+'!';
  $('s3n').textContent=username;
  if(avatarUrl){try{$('s3img').src=avatarUrl;}catch{}}
  btn.textContent='Let\'s Go →';btn.disabled=false;
  goS(3);
}

async function getRobloxUser(username){
  try{const r=await fetch(BACKEND+'/api/roblox/user/'+encodeURIComponent(username));const d=await r.json();return d.found?d:null;}catch{return null;}
}
async function getRobloxAvatar(userId){
  try{const r=await fetch(BACKEND+'/api/roblox/avatar/'+userId);const d=await r.json();return d.avatarUrl||null;}catch{return null;}
}

function goS(n){document.querySelectorAll('.astep').forEach(s=>s.classList.remove('on'));$('s'+n).classList.add('on');}

function enterApp(){
  try{sv();}catch{}
  $('auth').classList.add('gone');
  $('app').classList.add('show');
  try{if(user.avatarUrl&&user.avatarUrl!='')$('tav').src=user.avatarUrl;}catch{}
  $('tuname').textContent=user.username;
  try{$('tokval').textContent=token;}catch{}
  $('boott').textContent=ts();
  if(projects.length===0)seedP();
  initExamples();
  startPoll();
}

function logout(){
  user=null;token=null;localStorage.clear();stopPoll();
  $('app').classList.remove('show');
  $('auth').classList.remove('gone');
  goS(1);$('rbx-user').value='';
}

/* ══ Boot ══ */
try{
  ld();
  if(user&&token){
    goS(3);
    $('s3t').textContent='Welcome back, '+user.username+'!';
    try{if(user.avatarUrl&&user.avatarUrl!='')$('s3img').src=user.avatarUrl;}catch{}
    $('s3n').textContent=user.username;
    $('s3s').textContent='Session active — tap to continue.';
  }
}catch(e){console.log('Boot error:',e);goS(1);}

/* ══ Log ══ */
function addLog(kind,lbl,msg){
  const inner=$('loginner'),d=document.createElement('div');
  d.className=`le ${kind}`;
  d.innerHTML=`<div class="le-row"><span class="le-tag ${kind}">${kind}</span><span class="le-time">${ts()}</span></div><div class="le-body">${String(msg).replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`;
  inner.appendChild(d);inner.scrollTop=inner.scrollHeight;
  entries.push({kind,lbl,msg});
  $('logcnt').textContent=entries.length+' entr'+(entries.length===1?'y':'ies');
}

/* ══ Poll ══ */
function startPoll(){
  pollInt=setInterval(async()=>{
    try{
      const r=await fetch(BACKEND+'/api/ping/'+token);
      const d=await r.json();
      if(d.connected&&!connected)setConn(true);
      if(!d.connected&&connected)setConn(false);
    }catch{}
  },2000);
}
function stopPoll(){if(pollInt)clearInterval(pollInt);}
function setConn(v){
  connected=v;
  const cls='t-dot '+(v?'on':'wait');
  $('tdot').className=cls;
  if($('conn-dot2'))$('conn-dot2').className=cls;
  $('tconntxt').textContent=v?'Studio connected':'No plugin';
  if($('conn-txt2'))$('conn-txt2').textContent=v?'Connected':'Waiting';
  if($('sdot'))$('sdot').className='bigdot '+(v?'on':'wait');
  if($('sname'))$('sname').textContent=v?'Studio connected':'Waiting for plugin';
  if($('sdesc'))$('sdesc').textContent=v?'Commands execute in Studio.':'Open Studio and activate plugin.';
  if(v){
    toast('Studio connected!','ok');
    addLog('sys','conn','Plugin connected! Running as: '+user.username);
    // Refresh avatar when plugin connects
    if(user&&user.userId&&!user.avatarUrl){
      getRobloxAvatar(user.userId).then(url=>{
        if(url){
          user.avatarUrl=url;
          try{$('tav').src=url;}catch{}
          try{sv();}catch{}
        }
      });
    }
  }
}

/* ══ Projects ══ */
function seedP(){projects=[{id:rndId(),name:'My Game',status:'offline',t:Date.now()}];sv();}
function createProj(){const n=$('np-name').value.trim();if(!n){toast('Enter a name.','bad');return;}projects.unshift({id:rndId(),name:n,status:'offline',t:Date.now()});sv();closeModal();toast('"'+n+'" created.','ok');}
function openModal(){$('mproj').classList.add('open');}
function closeModal(){$('mproj').classList.remove('open');}
document.querySelectorAll('.overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');}));
function copyTok(){navigator.clipboard.writeText(token).catch(()=>{});toast('Token copied!','ok');}
function copyTxt(t){navigator.clipboard.writeText(t).catch(()=>{});toast('Copied!','ok');}
