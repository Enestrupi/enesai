<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>ENES AI — Roblox Studio</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&family=Syne:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
/* ════════════════════════════════════════════════════════
   ENES AI — COMPLETE STYLESHEET
   The most powerful Roblox Studio AI dashboard ever built
════════════════════════════════════════════════════════ */

/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
button,input,textarea,select{font-family:inherit;-webkit-appearance:none;appearance:none}
img{display:block;max-width:100%}

/* ── CSS VARIABLES ── */
:root{
/* Backgrounds */
–bg-0:#010306;
–bg-1:#040810;
–bg-2:#07101e;
–bg-3:#0b1828;
–bg-4:#101f32;
–bg-5:#16273e;
–bg-6:#1c2f4a;

/* Orange/Gold accent (ENES brand) */
–orange:#ff8c00;
–orange-light:#ffaa33;
–orange-dark:#cc6e00;
–orange-dim:rgba(255,140,0,0.08);
–orange-glow:rgba(255,140,0,0.18);
–orange-glow2:rgba(255,140,0,0.36);
–orange-glow3:rgba(255,140,0,0.55);

/* Gold */
–gold:#ffcc44;
–gold-dim:rgba(255,204,68,0.1);

/* Green (success) */
–green:#00ffaa;
–green-dim:rgba(0,255,170,0.08);
–green-glow:rgba(0,255,170,0.28);

/* Red (error) */
–red:#ff3355;
–red-dim:rgba(255,51,85,0.08);
–red-glow:rgba(255,51,85,0.28);

/* Blue (info) */
–blue:#00aaff;
–blue-dim:rgba(0,170,255,0.08);
–blue-glow:rgba(0,170,255,0.28);

/* Purple (AI) */
–purple:#cc44ff;
–purple-dim:rgba(204,68,255,0.08);
–purple-glow:rgba(204,68,255,0.28);

/* Yellow */
–yellow:#ffee44;
–yellow-dim:rgba(255,238,68,0.08);

/* Text */
–text-0:#f0e0cc;
–text-1:#c8a888;
–text-2:#7a5c44;
–text-3:#3a2518;
–text-4:#1e1208;

/* Borders */
–b0:rgba(255,140,0,0.05);
–b1:rgba(255,140,0,0.10);
–b2:rgba(255,140,0,0.18);
–b3:rgba(255,140,0,0.30);
–b4:rgba(255,140,0,0.50);

/* Typography */
–font-mono:‘JetBrains Mono’,monospace;
–font-display:‘Syne’,sans-serif;

/* Border radius */
–r4:4px;–r6:6px;–r8:8px;–r10:10px;
–r12:12px;–r16:16px;–r20:20px;–r24:24px;–r32:32px;

/* Shadows */
–shadow-sm:0 2px 8px rgba(0,0,0,0.4);
–shadow-md:0 4px 16px rgba(0,0,0,0.5);
–shadow-lg:0 8px 32px rgba(0,0,0,0.6);
–shadow-orange:0 4px 20px var(–orange-glow),0 0 40px var(–orange-dim);
–shadow-green:0 4px 20px var(–green-glow);
–shadow-red:0 4px 20px var(–red-glow);
}

/* ── BASE STYLES ── */
body{
background:var(–bg-0);
color:var(–text-0);
font-family:var(–font-mono);
font-size:13px;
line-height:1.6;
}

/* ── SCROLLBARS ── */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(–b2);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(–b3)}

/* ════════════════════════════════════════════════════════
ANIMATED BACKGROUND SYSTEM
════════════════════════════════════════════════════════ */
.bg-system{
position:fixed;inset:0;
z-index:0;
overflow:hidden;
pointer-events:none;
}

/* Grid pattern */
.bg-grid{
position:absolute;inset:0;
background-image:
linear-gradient(rgba(255,140,0,0.035) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,140,0,0.035) 1px,transparent 1px);
background-size:44px 44px;
}

/* Dot grid overlay */
.bg-dots{
position:absolute;inset:0;
background-image:radial-gradient(rgba(255,140,0,0.12) 1px,transparent 1px);
background-size:44px 44px;
background-position:22px 22px;
opacity:.4;
}

/* Animated glows */
.bg-glow-orange{
position:absolute;
top:-40%;left:-30%;
width:90%;height:90%;
background:radial-gradient(ellipse,rgba(255,140,0,0.055) 0%,transparent 55%);
animation:bg-float-1 24s ease-in-out infinite alternate;
}
.bg-glow-blue{
position:absolute;
bottom:-40%;right:-30%;
width:80%;height:80%;
background:radial-gradient(ellipse,rgba(0,170,255,0.04) 0%,transparent 55%);
animation:bg-float-2 30s ease-in-out infinite alternate;
}
.bg-glow-purple{
position:absolute;
top:30%;left:20%;
width:60%;height:60%;
background:radial-gradient(ellipse,rgba(204,68,255,0.035) 0%,transparent 55%);
animation:bg-float-3 20s ease-in-out infinite alternate;
}
.bg-glow-center{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
width:40%;height:40%;
background:radial-gradient(ellipse,rgba(255,140,0,0.02) 0%,transparent 60%);
animation:bg-pulse-center 8s ease-in-out infinite;
}

/* Scanlines */
.bg-scanlines{
position:absolute;inset:0;
background:repeating-linear-gradient(
0deg,
transparent,
transparent 3px,
rgba(0,0,0,0.018) 3px,
rgba(0,0,0,0.018) 6px
);
}

/* Vignette */
.bg-vignette{
position:absolute;inset:0;
background:radial-gradient(
ellipse at center,
transparent 40%,
rgba(1,3,6,0.6) 100%
);
}

/* Corner accents */
.bg-corner{
position:absolute;
width:120px;height:120px;
opacity:.3;
}
.bg-corner.tl{top:0;left:0;border-top:1px solid var(–orange);border-left:1px solid var(–orange)}
.bg-corner.tr{top:0;right:0;border-top:1px solid var(–orange);border-right:1px solid var(–orange)}
.bg-corner.bl{bottom:0;left:0;border-bottom:1px solid var(–orange);border-left:1px solid var(–orange)}
.bg-corner.br{bottom:0;right:0;border-bottom:1px solid var(–orange);border-right:1px solid var(–orange)}

@keyframes bg-float-1{0%{transform:translate(0,0) scale(1)}100%{transform:translate(8%,6%) scale(1.15)}}
@keyframes bg-float-2{0%{transform:translate(0,0) scale(1)}100%{transform:translate(-7%,-9%) scale(1.2)}}
@keyframes bg-float-3{0%{transform:translate(0,0) scale(1)}100%{transform:translate(5%,-6%) scale(1.1)}}
@keyframes bg-pulse-center{0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}}

/* ════════════════════════════════════════════════════════
GLOBAL ANIMATIONS
════════════════════════════════════════════════════════ */
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes pulse-fast{0%,100%{opacity:.5}50%{opacity:1}}

@keyframes glow-orange{
0%,100%{box-shadow:0 0 8px var(–orange),0 0 16px var(–orange-glow)}
50%{box-shadow:0 0 16px var(–orange),0 0 32px var(–orange-glow2),0 0 48px var(–orange-glow)}
}

@keyframes glow-green{
0%,100%{box-shadow:0 0 6px var(–green),0 0 12px var(–green-glow)}
50%{box-shadow:0 0 12px var(–green),0 0 24px var(–green-glow)}
}

@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes spin-slow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

@keyframes slide-up{
from{opacity:0;transform:translateY(12px)}
to{opacity:1;transform:translateY(0)}
}
@keyframes slide-down{
from{opacity:0;transform:translateY(-12px)}
to{opacity:1;transform:translateY(0)}
}
@keyframes slide-left{
from{opacity:0;transform:translateX(16px)}
to{opacity:1;transform:translateX(0)}
}
@keyframes slide-right{
from{opacity:0;transform:translateX(-16px)}
to{opacity:1;transform:translateX(0)}
}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes scale-in{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}

@keyframes dot-pop{
0%,100%{transform:translateY(0) scale(.5);opacity:.3}
50%{transform:translateY(-5px) scale(1.1);opacity:1}
}

@keyframes progress{
0%{transform:translateX(-100%)}
100%{transform:translateX(100%)}
}

@keyframes shimmer{
0%{background-position:-200% center}
100%{background-position:200% center}
}

@keyframes type-cursor{
0%,100%{opacity:1}
50%{opacity:0}
}

@keyframes float-up-down{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-6px)}
}

@keyframes rotate-border{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

/* ════════════════════════════════════════════════════════
ROOT LAYOUT
════════════════════════════════════════════════════════ */
#root{
position:relative;
z-index:1;
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

#app{
display:flex;
flex-direction:column;
height:100vh;
overflow:hidden;
}

/* ════════════════════════════════════════════════════════
TOPBAR
════════════════════════════════════════════════════════ */
.topbar{
height:58px;
background:rgba(1,3,6,0.95);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
border-bottom:0.5px solid var(–b1);
display:flex;
align-items:center;
padding:0 16px;
gap:10px;
flex-shrink:0;
position:relative;
z-index:100;
}

/* Topbar accent line */
.topbar::before{
content:’’;
position:absolute;
bottom:0;inset-x:0;
height:1px;
background:linear-gradient(
90deg,
transparent 0%,
var(–orange-dark) 20%,
var(–orange) 50%,
var(–orange-dark) 80%,
transparent 100%
);
opacity:.5;
}

/* Top edge glow */
.topbar::after{
content:’’;
position:absolute;
top:0;inset-x:0;
height:1px;
background:linear-gradient(
90deg,
transparent,
rgba(255,140,0,0.15),
transparent
);
}

/* Brand */
.brand{
display:flex;
align-items:center;
gap:10px;
flex-shrink:0;
}

.brand-mark{
width:32px;height:32px;
border-radius:var(–r10);
background:linear-gradient(135deg,var(–orange) 0%,var(–gold) 100%);
display:flex;align-items:center;justify-content:center;
font-family:var(–font-display);
font-size:16px;font-weight:900;
color:var(–bg-0);
animation:glow-orange 3s ease-in-out infinite;
flex-shrink:0;
position:relative;
overflow:hidden;
}
.brand-mark::after{
content:’’;
position:absolute;inset:0;
background:linear-gradient(135deg,rgba(255,255,255,0.2),transparent);
}

.brand-name{
font-family:var(–font-display);
font-size:20px;
font-weight:900;
letter-spacing:-.01em;
background:linear-gradient(135deg,var(–orange) 0%,var(–gold) 60%,var(–orange) 100%);
background-size:200% 100%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
animation:shimmer 4s linear infinite;
}

.brand-tag{
font-size:9px;
color:var(–text-2);
letter-spacing:.12em;
text-transform:uppercase;
border:0.5px solid var(–b1);
border-radius:var(–r4);
padding:2px 6px;
display:none;
}
@media(min-width:420px){.brand-tag{display:block}}

/* Status pill */
.conn-pill{
display:flex;
align-items:center;
gap:6px;
padding:6px 12px;
background:var(–bg-2);
border:0.5px solid var(–b1);
border-radius:var(–r20);
font-size:10px;
color:var(–text-2);
transition:all .3s;
margin-left:auto;
cursor:default;
}
.conn-pill.live{
border-color:rgba(0,255,170,0.2);
background:rgba(0,255,170,0.04);
color:var(–green);
}

.conn-dot{
width:7px;height:7px;
border-radius:50%;
background:var(–text-3);
flex-shrink:0;
transition:all .3s;
}
.conn-dot.on{
background:var(–green);
animation:glow-green 2.5s ease-in-out infinite;
}
.conn-dot.wait{
background:var(–orange);
animation:blink 1.3s ease-in-out infinite;
}
.conn-dot.err{background:var(–red)}

/* Topbar actions */
.topbar-actions{
display:flex;
align-items:center;
gap:6px;
flex-shrink:0;
}

.tb-btn{
display:flex;align-items:center;gap:5px;
padding:6px 11px;
background:var(–bg-2);
border:0.5px solid var(–b1);
border-radius:var(–r8);
font-size:11px;
color:var(–text-2);
cursor:pointer;
transition:all .18s;
font-family:var(–font-mono);
font-weight:700;
}
.tb-btn:hover{
border-color:var(–b3);
color:var(–orange);
background:var(–orange-dim);
}
.tb-btn:active{transform:scale(.95)}

.tb-btn .tb-icon{font-size:13px}

/* ════════════════════════════════════════════════════════
MAIN LAYOUT
════════════════════════════════════════════════════════ */
.app-body{
flex:1;
display:flex;
overflow:hidden;
}

.main-col{
flex:1;
display:flex;
flex-direction:column;
overflow:hidden;
min-width:0;
}

/* ════════════════════════════════════════════════════════
INPUT ZONE
════════════════════════════════════════════════════════ */
.input-zone{
padding:14px 14px 10px;
flex-shrink:0;
background:var(–bg-0);
position:relative;
}

.input-zone::after{
content:’’;
position:absolute;
bottom:0;inset-x:0;
height:0.5px;
background:linear-gradient(90deg,transparent,var(–b2),transparent);
}

/* Input header */
.input-head{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:10px;
}

.input-title{
display:flex;align-items:center;gap:8px;
font-family:var(–font-display);
font-size:15px;font-weight:900;
}

.input-title-text{
background:linear-gradient(135deg,var(–orange),var(–gold));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
}

.input-title-pip{
width:8px;height:8px;
border-radius:50%;
background:var(–orange);
box-shadow:0 0 10px var(–orange);
animation:glow-orange 2.5s ease-in-out infinite;
flex-shrink:0;
}

/* Model badge */
.model-badge{
display:flex;align-items:center;gap:5px;
padding:4px 10px;
background:var(–bg-2);
border:0.5px solid var(–b1);
border-radius:var(–r20);
font-size:10px;
color:var(–text-2);
cursor:pointer;
transition:all .15s;
}
.model-badge:hover{border-color:var(–b3);color:var(–orange)}
.model-badge-dot{
width:5px;height:5px;
border-radius:50%;
background:var(–green);
animation:pulse 2s ease-in-out infinite;
}

/* ════════════════════════════════════════════════════════
COMMAND TEXTAREA
════════════════════════════════════════════════════════ */
.cmd-container{
position:relative;
margin-bottom:10px;
}

/* Animated gradient border */
.cmd-border-glow{
position:absolute;
inset:-1px;
border-radius:calc(var(–r12) + 1px);
background:conic-gradient(
from var(–angle, 0deg),
var(–orange),
var(–gold),
var(–orange-light),
var(–orange)
);
opacity:0;
transition:opacity .3s;
pointer-events:none;
z-index:0;
}
.cmd-container:focus-within .cmd-border-glow{opacity:.7}

.cmd-inner{
position:relative;
z-index:1;
border-radius:var(–r12);
overflow:hidden;
}

.cmd-textarea{
width:100%;
background:var(–bg-2);
border:0.5px solid var(–b2);
border-radius:var(–r12);
padding:14px;
font-family:var(–font-mono);
font-size:14px;
color:var(–text-0);
outline:none;
resize:none;
min-height:115px;
max-height:200px;
line-height:1.68;
transition:border-color .25s,box-shadow .25s;
display:block;
}
.cmd-textarea:focus{
border-color:var(–orange);
box-shadow:0 0 0 2px var(–orange-glow),0 0 28px var(–orange-glow);
}
.cmd-textarea::placeholder{
color:var(–text-3);
line-height:1.75;
}

/* Textarea bottom bar */
.cmd-bottom-bar{
display:flex;align-items:center;
justify-content:space-between;
padding:5px 4px 2px;
pointer-events:none;
}
.cmd-char-count{font-size:10px;color:var(–text-3)}
.cmd-status-text{
font-size:10px;color:var(–text-3);
display:flex;align-items:center;gap:4px;
}
.cmd-status-pip{
width:4px;height:4px;
border-radius:50%;
background:var(–green);
animation:pulse 2s ease-in-out infinite;
}

/* ════════════════════════════════════════════════════════
AI GENERATION STATE
════════════════════════════════════════════════════════ */
.ai-state-wrap{
display:none;
flex-direction:column;
gap:7px;
margin-bottom:10px;
animation:slide-up .2s ease;
}
.ai-state-wrap.visible{display:flex}

/* Thinking bar */
.thinking-bar{
display:flex;
align-items:center;
gap:10px;
padding:11px 14px;
background:linear-gradient(
135deg,
rgba(255,140,0,0.07),
rgba(204,68,255,0.04)
);
border:0.5px solid var(–b2);
border-radius:var(–r10);
font-size:12px;
color:var(–orange);
position:relative;
overflow:hidden;
}

/* Progress line */
.thinking-bar::after{
content:’’;
position:absolute;
bottom:0;left:-100%;
width:100%;height:1px;
background:linear-gradient(90deg,transparent,var(–orange),var(–gold),transparent);
animation:progress 1.8s ease-in-out infinite;
}

.thinking-dots{display:flex;gap:4px;flex-shrink:0}
.thinking-dots span{
width:6px;height:6px;
background:var(–orange);
border-radius:50%;
animation:dot-pop 1s ease-in-out infinite;
display:block;
}
.thinking-dots span:nth-child(2){animation-delay:.18s}
.thinking-dots span:nth-child(3){animation-delay:.36s}

.thinking-msg{flex:1;font-size:12px;color:var(–orange)}

.thinking-spinner{
width:15px;height:15px;
border:1.5px solid var(–b2);
border-top-color:var(–orange);
border-radius:50%;
animation:spin .75s linear infinite;
flex-shrink:0;
}

/* Code preview */
.code-preview-wrap{
background:var(–bg-2);
border:0.5px solid rgba(255,140,0,0.22);
border-radius:var(–r12);
overflow:hidden;
animation:scale-in .2s ease;
}

.code-preview-head{
display:flex;align-items:center;justify-content:space-between;
padding:9px 13px;
background:linear-gradient(
135deg,
rgba(255,140,0,0.09),
rgba(204,68,255,0.04)
);
border-bottom:0.5px solid var(–b1);
}

.code-preview-badge{
display:flex;align-items:center;gap:7px;
font-size:10px;color:var(–orange);
font-weight:700;text-transform:uppercase;
letter-spacing:.1em;
}
.code-preview-badge::before{
content:’’;
width:6px;height:6px;
border-radius:50%;
background:var(–orange);
box-shadow:0 0 8px var(–orange);
flex-shrink:0;
}

.code-preview-actions{display:flex;gap:6px}

.code-action-btn{
padding:3px 9px;
background:var(–bg-3);
border:0.5px solid var(–b2);
border-radius:var(–r4);
font-size:10px;color:var(–text-2);
cursor:pointer;transition:all .15s;
font-family:var(–font-mono);
}
.code-action-btn:hover{border-color:var(–b3);color:var(–orange)}

.code-preview-body{
padding:12px 13px;
font-size:11px;
color:var(–text-2);
font-family:var(–font-mono);
white-space:pre-wrap;
word-break:break-all;
max-height:160px;
overflow-y:auto;
line-height:1.65;
}

/* Syntax-highlight-like colors */
.code-preview-body .kw{color:var(–purple)}
.code-preview-body .fn{color:var(–blue)}
.code-preview-body .str{color:var(–green)}
.code-preview-body .num{color:var(–orange)}
.code-preview-body .cm{color:var(–text-3)}

.code-preview-note{
padding:9px 13px;
border-top:0.5px solid var(–b0);
font-size:11px;
color:var(–text-2);
line-height:1.6;
background:rgba(0,0,0,0.2);
display:flex;align-items:flex-start;gap:7px;
}
.code-note-icon{
font-size:13px;flex-shrink:0;margin-top:1px;
}

/* Complexity badge */
.complexity-badge{
display:inline-flex;align-items:center;gap:4px;
padding:2px 8px;
border-radius:var(–r4);
font-size:9px;font-weight:700;
text-transform:uppercase;
letter-spacing:.08em;
margin-left:auto;
flex-shrink:0;
}
.complexity-badge.simple{background:var(–blue-dim);color:var(–blue)}
.complexity-badge.medium{background:var(–orange-dim);color:var(–orange)}
.complexity-badge.complex{background:var(–purple-dim);color:var(–purple)}
.complexity-badge.epic{
background:linear-gradient(135deg,var(–orange-dim),var(–gold-dim));
color:var(–gold);
animation:pulse 2s ease-in-out infinite;
}

/* ════════════════════════════════════════════════════════
ACTION BUTTONS
════════════════════════════════════════════════════════ */
.action-bar{
display:flex;
align-items:center;
gap:8px;
}

/* Base button */
.btn{
display:inline-flex;
align-items:center;
justify-content:center;
gap:7px;
padding:11px 16px;
border-radius:var(–r10);
font-family:var(–font-mono);
font-size:12px;
font-weight:700;
cursor:pointer;
transition:all .18s cubic-bezier(.4,0,.2,1);
border:0.5px solid var(–b2);
position:relative;
overflow:hidden;
white-space:nowrap;
flex-shrink:0;
}
.btn::before{
content:’’;
position:absolute;inset:0;
background:linear-gradient(135deg,rgba(255,255,255,0.06),transparent);
opacity:0;
transition:opacity .2s;
}
.btn:hover::before{opacity:1}
.btn:active{transform:scale(.95)}
.btn:disabled{
opacity:.45 !important;
cursor:not-allowed !important;
transform:none !important;
box-shadow:none !important;
}

/* Clear button */
.btn-clear{
background:var(–bg-2);
color:var(–text-2);
}
.btn-clear:hover{
border-color:var(–red);
color:var(–red);
background:var(–red-dim);
}

/* Retry button */
.btn-retry{
background:var(–bg-2);
color:var(–text-2);
display:none;
}
.btn-retry:hover{
border-color:var(–b3);
color:var(–orange);
}

/* Main action button */
.btn-action{
flex:1;
background:linear-gradient(135deg,var(–orange) 0%,var(–gold) 100%);
color:var(–bg-0);
border-color:transparent;
font-weight:800;
font-size:13px;
margin-left:auto;
box-shadow:var(–shadow-orange);
letter-spacing:.02em;
}
.btn-action:hover{
box-shadow:0 4px 28px var(–orange-glow2),0 0 50px var(–orange-glow);
transform:translateY(-2px);
background:linear-gradient(135deg,var(–orange-light) 0%,var(–gold) 100%);
}
.btn-action:active{transform:scale(.96) translateY(0)}

/* Send variant */
.btn-action.send-mode{
background:linear-gradient(135deg,var(–blue) 0%,#44ccff 100%);
box-shadow:0 4px 20px var(–blue-glow);
}
.btn-action.send-mode:hover{
box-shadow:0 4px 28px var(–blue-glow),0 0 50px var(–blue-dim);
}

/* Button icon */
.btn-icon{font-size:14px;flex-shrink:0}

/* ════════════════════════════════════════════════════════
EXAMPLES STRIP
════════════════════════════════════════════════════════ */
.examples-wrap{
flex-shrink:0;
background:var(–bg-0);
padding:8px 0 6px;
position:relative;
}

.examples-wrap::before{
content:’’;
position:absolute;
top:0;inset-x:0;height:0.5px;
background:linear-gradient(90deg,transparent,var(–b2),transparent);
}

.examples-header{
display:flex;align-items:center;gap:8px;
padding:0 14px;
margin-bottom:7px;
}

.examples-label{
font-size:9px;
color:var(–text-3);
letter-spacing:.13em;
text-transform:uppercase;
flex-shrink:0;
}

.examples-line{
flex:1;height:0.5px;
background:linear-gradient(90deg,var(–b1),transparent);
}

.examples-count{
font-size:9px;
color:var(–text-3);
flex-shrink:0;
}

.examples-track{
display:flex;
gap:6px;
overflow-x:auto;
padding:0 14px 2px;
-webkit-overflow-scrolling:touch;
scroll-behavior:smooth;
}
.examples-track::-webkit-scrollbar{display:none}

/* Example chip */
.ex-chip{
display:inline-flex;
align-items:center;
gap:5px;
padding:7px 13px;
background:var(–bg-2);
border:0.5px solid var(–b1);
border-radius:var(–r20);
font-size:11px;
color:var(–text-2);
cursor:pointer;
font-family:var(–font-mono);
font-weight:700;
white-space:nowrap;
flex-shrink:0;
transition:all .18s;
line-height:1;
}
.ex-chip:hover{
border-color:var(–b3);
color:var(–orange);
background:var(–orange-dim);
box-shadow:0 0 12px var(–orange-glow);
transform:translateY(-1px);
}
.ex-chip:active{transform:scale(.93) translateY(0)}

/* Category colors */
.ex-chip.cat-terrain:hover{color:var(–green);border-color:rgba(0,255,170,0.3);background:var(–green-dim);box-shadow:0 0 12px var(–green-glow)}
.ex-chip.cat-scripts:hover{color:var(–blue);border-color:rgba(0,170,255,0.3);background:var(–blue-dim);box-shadow:0 0 12px var(–blue-glow)}
.ex-chip.cat-gui:hover{color:var(–purple);border-color:rgba(204,68,255,0.3);background:var(–purple-dim);box-shadow:0 0 12px var(–purple-glow)}
.ex-chip.cat-game:hover{color:var(–gold);border-color:rgba(255,204,68,0.3);background:var(–gold-dim)}

/* ════════════════════════════════════════════════════════
EXECUTION LOG
════════════════════════════════════════════════════════ */
.log-wrap{
flex:1;
overflow:hidden;
display:flex;
flex-direction:column;
min-height:0;
}

.log-header{
display:flex;align-items:center;justify-content:space-between;
padding:8px 14px;
flex-shrink:0;
background:var(–bg-0);
position:relative;
}
.log-header::before{
content:’’;
position:absolute;
top:0;inset-x:0;height:0.5px;
background:linear-gradient(90deg,transparent,var(–b1),transparent);
}

.log-title-row{
display:flex;align-items:center;gap:7px;
font-size:10px;font-weight:700;
color:var(–text-2);
letter-spacing:.1em;text-transform:uppercase;
}

.log-title-indicator{
width:7px;height:7px;
border-radius:50%;
background:var(–orange);
box-shadow:0 0 8px var(–orange);
animation:pulse 2s ease-in-out infinite;
}

.log-right{display:flex;align-items:center;gap:8px}

.log-entry-count{
font-size:10px;
color:var(–text-3);
padding:2px 7px;
background:var(–bg-2);
border:0.5px solid var(–b0);
border-radius:var(–r4);
}

.log-clear-btn{
padding:3px 8px;
background:none;
border:0.5px solid var(–b1);
border-radius:var(–r4);
font-size:10px;
color:var(–text-3);
cursor:pointer;
transition:all .15s;
font-family:var(–font-mono);
}
.log-clear-btn:hover{border-color:var(–red);color:var(–red)}

/* Log body */
.log-body{
flex:1;
overflow-y:auto;
padding:8px 14px;
display:flex;
flex-direction:column;
gap:5px;
-webkit-overflow-scrolling:touch;
}

/* Log entry */
.log-entry{
padding:9px 11px;
border-radius:var(–r10);
border-left:2px solid var(–b1);
background:var(–bg-2);
animation:slide-up .15s ease;
position:relative;
overflow:hidden;
transition:background .15s;
}
.log-entry:hover{background:var(–bg-3)}

/* Entry top gradient */
.log-entry::before{
content:’’;
position:absolute;
top:0;left:0;right:0;height:1px;
opacity:.12;
}
.log-entry.ai{border-left-color:var(–orange)}
.log-entry.ai::before{background:var(–orange)}
.log-entry.sent{border-left-color:var(–blue)}
.log-entry.sent::before{background:var(–blue)}
.log-entry.ok{border-left-color:var(–green)}
.log-entry.ok::before{background:var(–green)}
.log-entry.err{border-left-color:var(–red)}
.log-entry.err::before{background:var(–red)}
.log-entry.sys{border-left-color:var(–text-3)}
.log-entry.warn{border-left-color:var(–yellow)}
.log-entry.warn::before{background:var(–yellow)}

/* Entry meta */
.log-entry-meta{
display:flex;align-items:center;gap:6px;
margin-bottom:4px;
}

.log-tag{
font-size:9px;
padding:2px 7px;
border-radius:var(–r4);
font-weight:700;
text-transform:uppercase;
letter-spacing:.07em;
flex-shrink:0;
}
.log-tag.ai{background:rgba(255,140,0,0.12);color:var(–orange)}
.log-tag.sent{background:var(–blue-dim);color:var(–blue)}
.log-tag.ok{background:var(–green-dim);color:var(–green)}
.log-tag.err{background:var(–red-dim);color:var(–red)}
.log-tag.sys{background:var(–bg-4);color:var(–text-3)}
.log-tag.warn{background:var(–yellow-dim);color:var(–yellow)}

.log-entry-time{
font-size:10px;
color:var(–text-3);
margin-left:auto;
flex-shrink:0;
}

.log-entry-msg{
font-size:11px;
color:var(–text-2);
line-height:1.6;
word-break:break-all;
}

/* ════════════════════════════════════════════════════════
SIDE PANEL (desktop)
════════════════════════════════════════════════════════ */
.side-panel{
display:none;
width:280px;
flex-shrink:0;
flex-direction:column;
overflow-y:auto;
border-left:0.5px solid var(–b1);
background:var(–bg-0);
}
@media(min-width:860px){.side-panel{display:flex}}

.side-section{
padding:14px;
border-bottom:0.5px solid var(–b0);
}

.side-section-title{
font-size:9px;font-weight:700;
color:var(–text-3);
letter-spacing:.14em;
text-transform:uppercase;
margin-bottom:10px;
display:flex;align-items:center;gap:7px;
}
.side-section-title::after{
content:’’;flex:1;height:0.5px;
background:linear-gradient(90deg,var(–b1),transparent);
}

/* Connection card */
.conn-card{
background:var(–bg-2);
border:0.5px solid var(–b1);
border-radius:var(–r12);
padding:12px;
margin-bottom:10px;
}

.conn-card-status{
display:flex;align-items:center;gap:9px;
margin-bottom:8px;
}

.conn-card-dot{
width:11px;height:11px;
border-radius:50%;
background:var(–text-3);
flex-shrink:0;
transition:all .3s;
}
.conn-card-dot.on{
background:var(–green);
animation:glow-green 2.5s ease-in-out infinite;
}
.conn-card-dot.wait{
background:var(–orange);
animation:blink 1.3s ease-in-out infinite;
}

.conn-card-name{
font-family:var(–font-display);
font-size:13px;font-weight:800;
}
.conn-card-desc{
font-size:11px;color:var(–text-2);line-height:1.5;
}

/* Token display */
.token-display{
background:var(–bg-3);
border:0.5px solid var(–b1);
border-radius:var(–r8);
padding:9px 11px;
display:flex;align-items:center;
justify-content:space-between;gap:8px;
}
.token-display-inner{flex:1;min-width:0}
.token-label{
font-size:9px;color:var(–text-3);
letter-spacing:.1em;text-transform:uppercase;
margin-bottom:2px;
}
.token-value{
font-size:12px;color:var(–orange);
font-weight:700;letter-spacing:.04em;
word-break:break-all;
}
.token-copy-btn{
padding:5px 9px;
background:var(–bg-4);
border:0.5px solid var(–b1);
border-radius:var(–r6);
font-size:10px;color:var(–text-2);
cursor:pointer;transition:all .15s;
white-space:nowrap;flex-shrink:0;
font-family:var(–font-mono);
}
.token-copy-btn:hover{border-color:var(–b3);color:var(–orange)}

/* Setup steps */
.setup-list{display:flex;flex-direction:column;gap:10px}
.setup-item{display:flex;gap:9px;align-items:flex-start}

.setup-step-num{
width:20px;height:20px;
border-radius:50%;
background:var(–bg-4);
border:0.5px solid var(–b1);
font-size:10px;color:var(–text-3);
display:flex;align-items:center;justify-content:center;
flex-shrink:0;margin-top:1px;
}

.setup-step-body .step-title{
font-size:12px;color:var(–text-0);
font-weight:700;margin-bottom:2px;
}
.setup-step-body .step-desc{
font-size:11px;color:var(–text-2);line-height:1.5;
}
.setup-step-body .step-desc code{
background:var(–bg-4);border-radius:var(–r4);
padding:1px 5px;color:var(–orange);font-size:10px;
}

.setup-code-block{
background:var(–bg-4);
border:0.5px solid var(–b1);
border-radius:var(–r6);
padding:7px 40px 7px 9px;
margin-top:5px;
font-size:10px;color:var(–orange);
word-break:break-all;
position:relative;
}
.setup-code-copy{
position:absolute;top:5px;right:6px;
padding:2px 6px;
background:none;
border:0.5px solid var(–b1);
border-radius:var(–r4);
font-size:9px;color:var(–text-3);
cursor:pointer;transition:all .15s;
font-family:var(–font-mono);
}
.setup-code-copy:hover{border-color:var(–b3);color:var(–orange)}

/* ════════════════════════════════════════════════════════
BOTTOM SHEET (mobile)
════════════════════════════════════════════════════════ */
.sheet-backdrop{
position:fixed;inset:0;
background:rgba(1,3,6,0.88);
backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);
display:flex;align-items:flex-end;justify-content:center;
z-index:500;
opacity:0;pointer-events:none;
transition:opacity .25s;
}
.sheet-backdrop.open{opacity:1;pointer-events:all}

.sheet-panel{
background:var(–bg-2);
border:0.5px solid var(–b2);
border-radius:var(–r24) var(–r24) 0 0;
padding:20px 20px 40px;
width:100%;max-width:520px;
transform:translateY(100%);
transition:transform .32s cubic-bezier(.4,0,.2,1);
position:relative;
max-height:90vh;
overflow-y:auto;
}
.sheet-backdrop.open .sheet-panel{transform:translateY(0)}

/* Sheet top accent */
.sheet-panel::before{
content:’’;
position:absolute;top:0;inset-x:0;height:1px;
background:linear-gradient(90deg,transparent,var(–orange),rgba(255,140,0,0.3),transparent);
opacity:.6;
}

.sheet-handle{
width:44px;height:4px;
background:var(–bg-5);
border-radius:2px;
margin:0 auto 18px;
}

.sheet-close-btn{
position:absolute;
top:16px;right:16px;
width:30px;height:30px;
border-radius:50%;
background:var(–bg-3);
border:0.5px solid var(–b1);
display:flex;align-items:center;justify-content:center;
font-size:13px;color:var(–text-2);
cursor:pointer;transition:all .15s;
}
.sheet-close-btn:hover{border-color:var(–red);color:var(–red)}

.sheet-title{
font-family:var(–font-display);
font-size:20px;font-weight:900;
margin-bottom:4px;
background:linear-gradient(135deg,var(–orange),var(–gold));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
}
.sheet-subtitle{font-size:12px;color:var(–text-2);margin-bottom:18px;line-height:1.6}

.sheet-section-title{
font-size:10px;font-weight:700;
color:var(–text-3);
letter-spacing:.12em;text-transform:uppercase;
margin-bottom:10px;margin-top:18px;
display:flex;align-items:center;gap:7px;
}
.sheet-section-title::after{
content:’’;flex:1;height:0.5px;
background:linear-gradient(90deg,var(–b1),transparent);
}

/* ════════════════════════════════════════════════════════
TOAST NOTIFICATIONS
════════════════════════════════════════════════════════ */
#toast-container{
position:fixed;
bottom:20px;left:12px;right:12px;
display:flex;flex-direction:column;gap:7px;
z-index:9999;
pointer-events:none;
}

.toast-item{
display:flex;align-items:center;gap:10px;
padding:11px 15px;
background:var(–bg-2);
border:0.5px solid var(–b2);
border-radius:var(–r12);
font-size:12px;
animation:slide-up .22s ease;
pointer-events:auto;
box-shadow:0 8px 28px rgba(0,0,0,0.5);
max-width:420px;
width:100%;
}
.toast-item.toast-ok{border-left:2px solid var(–green)}
.toast-item.toast-err{border-left:2px solid var(–red)}
.toast-item.toast-info{border-left:2px solid var(–blue)}
.toast-item.toast-ai{
border-left:2px solid var(–orange);
background:rgba(255,140,0,0.05);
}
.toast-item.toast-warn{border-left:2px solid var(–yellow)}

.toast-icon{font-size:16px;flex-shrink:0}
.toast-text{flex:1;color:var(–text-1)}
.toast-dismiss{
font-size:12px;color:var(–text-3);
cursor:pointer;padding:2px 5px;
transition:color .15s;
flex-shrink:0;
}
.toast-dismiss:hover{color:var(–red)}

/* ════════════════════════════════════════════════════════
STATS BAR
════════════════════════════════════════════════════════ */
.stats-bar{
display:none;
align-items:center;
gap:12px;
padding:5px 14px;
background:var(–bg-1);
border-bottom:0.5px solid var(–b0);
font-size:10px;
color:var(–text-3);
flex-shrink:0;
}
@media(min-width:600px){.stats-bar{display:flex}}

.stat-item{
display:flex;align-items:center;gap:4px;
}
.stat-dot{
width:4px;height:4px;
border-radius:50%;
background:var(–text-3);
}
.stat-dot.orange{background:var(–orange)}
.stat-dot.green{background:var(–green)}
.stat-dot.blue{background:var(–blue)}

/* ════════════════════════════════════════════════════════
RESPONSIVE OVERRIDES
════════════════════════════════════════════════════════ */
@media(max-width:400px){
.topbar{padding:0 12px;gap:8px}
.brand-name{font-size:18px}
.brand-mark{width:28px;height:28px;font-size:14px}
.input-zone{padding:10px 12px 8px}
.cmd-textarea{font-size:13px;min-height:100px}
.btn{padding:10px 14px;font-size:11px}
.log-body{padding:6px 12px}
}

@media(min-width:860px){
.examples-track{flex-wrap:wrap}
.ex-chip{font-size:10px;padding:5px 11px}
}

position:fixed;inset:0;z-index:9999;
background:var(–bg-0);
display:flex;flex-direction:column;
align-items:center;justify-content:center;
gap:20px;
transition:opacity .4s;

.loading-logo{

animation:progress 1.2s ease-in-out infinite;

.loading-text{

function showToast(message, type = 'info', duration = 3500) {
  const container = el('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast-item toast-${type}`;

  const icon = TOAST_ICONS[type] || '●';
  toast.innerHTML = `
    <span class="toast-icon">${icon}</span>
    <span class="toast-text">${message}</span>
    <span class="toast-dismiss" onclick="this.parentElement.remove()">✕</span>
  `;

  container.appendChild(toast);

  // Auto remove
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(10px)';
    toast.style.transition = 'all .3s';
    setTimeout(() => toast.remove(), 320);
  }, duration);
}

  const body = el('log-body');
  const entry = document.createElement('div');

    <div class="log-entry-msg">${String(message).replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>

  el('log-entry-count').textContent = logCount;
}

function copyText(text) {
  navigator.clipboard.writeText(text).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
  });
  showToast('Copied to clipboard!', 'ok', 2000);
}

function copyToken() {
  if (STATE.token) copyText(STATE.token);
}

function copyGeneratedCode() {
  if (STATE.generatedCode) {
    copyText(STATE.generatedCode);
    showToast('Lua code copied!', 'ok', 2000);
  }
}

  const body = el('code-preview-body');

async function handleMainAction() {

async function generateAICode() {
  const prompt = el('cmd-textarea').value.trim();
  if (!prompt) {
    showToast('Tell ENES AI what to build first!', 'warn');
    return;
  }

  if (STATE.isGenerating) return;
  STATE.isGenerating = true;

  // Show thinking state
  el('ai-state').classList.add('visible');
  el('thinking-bar').style.display = 'flex';
  el('code-preview').style.display = 'none';
  el('main-btn').disabled = true;
  el('main-btn-icon').textContent = '⟳';
  el('main-btn-text').textContent = 'Thinking…';
  el('retry-btn').style.display = 'none';
  el('cmd-status-label').textContent = 'ENES AI is generating your code…';

  // Animate thinking message
  let msgIdx = 0;
  const msgInterval = setInterval(() => {
    el('thinking-msg').textContent = THINKING_MESSAGES[msgIdx++ % THINKING_MESSAGES.length];
  }, 900);

  STATE.requestCount++;
  el('stat-requests').textContent = STATE.requestCount + ' request' + (STATE.requestCount === 1 ? '' : 's');

  addLogEntry('ai', `Request #${STATE.requestCount}: "${prompt.substring(0, 100)}${prompt.length > 100 ? '…' : ''}"`);

  try {
    const response = await fetch(BACKEND + '/api/ai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        prompt: prompt,
        system: ENES_AI_SYSTEM_PROMPT
      })
    });

    clearInterval(msgInterval);

    if (!response.ok) {
      const errData = await response.json().catch(() => ({}));
      throw new Error(errData.error || `HTTP ${response.status}`);
    }

    const data = await response.json();
    const rawText = (data.content && data.content[0]) ? data.content[0].text : '';

    if (!rawText) throw new Error('Empty response from AI');

    // Parse JSON response
    let parsed;
    try {
      const cleaned = rawText
        .replace(/^```json\s*/i, '')
        .replace(/^```\s*/i, '')
        .replace(/\s*```\s*$/i, '')
        .trim();
      parsed = JSON.parse(cleaned);
    } catch {
      // Fallback — treat entire response as Lua
      parsed = {
        lua: rawText,
        explanation: 'Generated Lua code.',
        complexity: 'medium',
        scripts: 'build'
      };
    }

    STATE.generatedCode = parsed.lua || rawText;

    // Show code preview
    el('thinking-bar').style.display = 'none';
    el('code-preview').style.display = 'block';
    el('code-preview-body').textContent = STATE.generatedCode;
    el('code-preview-note-text').textContent = parsed.explanation || 'Code generated successfully.';

    // Set complexity badge
    const comp = parsed.complexity || 'medium';
    const compEl = el('complexity-badge');
    compEl.textContent = comp;
    compEl.className = `complexity-badge ${comp}`;

    // Update button to send mode
    STATE.codeIsReady = true;
    el('main-btn').disabled = false;
    el('main-btn-icon').textContent = '▶';
    el('main-btn-text').textContent = 'Send to Studio';
    el('main-btn').classList.add('send-mode');
    el('retry-btn').style.display = 'flex';
    el('cmd-status-label').textContent = 'Code ready! Tap Send to execute in Studio.';

    const icons = { simple: '⚡', medium: '🔥', complex: '💎', epic: '🌟' };
    const icon = icons[comp] || '✦';

    addLogEntry('ok', `${icon} ${comp.toUpperCase()}: ${parsed.explanation}`);
    showToast(`${icon} Code ready — tap Send!`, 'ai');

  } catch (err) {
    clearInterval(msgInterval);
    el('thinking-bar').style.display = 'none';
    el('ai-state').classList.remove('visible');

    el('main-btn').disabled = false;
    el('main-btn-icon').textContent = '✦';
    el('main-btn-text').textContent = 'Generate & Send';
    el('main-btn').classList.remove('send-mode');
    el('cmd-status-label').textContent = 'Ready — free & instant via Groq';

    addLogEntry('err', 'AI Error: ' + err.message);
    showToast('Error: ' + err.message, 'err');
  }

  STATE.isGenerating = false;
}

async function sendToStudio() {
  if (!STATE.generatedCode || STATE.isSending) return;
  STATE.isSending = true;

  el('main-btn').disabled = true;
  el('main-btn-icon').textContent = '⟳';
  el('main-btn-text').textContent = 'Sending…';
  el('cmd-status-label').textContent = 'Sending to Roblox Studio…';

  addLogEntry('sent', 'Sending Lua code to Studio…');

  try {
    const cmdResponse = await fetch(BACKEND + '/api/command', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        token: STATE.token,
        type: 'run_script',
        body: STATE.generatedCode
      })
    });

    const cmdData = await cmdResponse.json();
    if (!cmdData.ok) throw new Error(cmdData.error || 'Command rejected by server');

    // Poll for execution result
    let result = null;
    for (let poll = 0; poll < RESULT_MAX_POLLS; poll++) {
      await new Promise(res => setTimeout(res, RESULT_POLL_INTERVAL_MS));
      try {
        const resultResponse = await fetch(BACKEND + '/api/result/' + STATE.token);
        const resultData = await resultResponse.json();
        if (resultData.ready) {
          result = resultData;
          break;
        }
      } catch { /* continue polling */ }
    }

    if (result) {
      if (result.success) {
        addLogEntry('ok', '✅ ' + (result.output || 'Script executed successfully in Studio!'));
        showToast('Done! Check Roblox Studio.', 'ok');
      } else {
        addLogEntry('err', '❌ Studio error: ' + (result.output || 'Unknown error'));
        showToast('Studio returned an error.', 'err');
      }
    } else {
      addLogEntry('warn', '⏱ No response from Studio. Is the plugin connected?');
      showToast('No response from Studio — check plugin.', 'warn');
    }

  } catch (err) {
    addLogEntry('err', 'Send failed: ' + err.message);
    showToast('Send failed: ' + err.message, 'err');
  }

  STATE.isSending = false;
  resetToGenerateState();
}

function resetToGenerateState() {
  STATE.generatedCode = null;
  STATE.codeIsReady = false;

  el('main-btn').disabled = false;
  el('main-btn-icon').textContent = '✦';
  el('main-btn-text').textContent = 'Generate & Send';
  el('main-btn').classList.remove('send-mode');

  el('retry-btn').style.display = 'none';
  el('code-preview').style.display = 'none';
  el('thinking-bar').style.display = 'none';
  el('ai-state').classList.remove('visible');

  el('cmd-textarea').value = '';
  el('char-count').textContent = '0 chars';
  el('cmd-status-label').textContent = 'Ready — free & instant via Groq';
}

function clearAll() { resetToGenerateState(); }

async function retryGeneration() {
  STATE.generatedCode = null;
  STATE.codeIsReady = false;
  el('main-btn-icon').textContent = '✦';
  el('main-btn-text').textContent = 'Generate & Send';
  el('main-btn').classList.remove('send-mode');
  await generateAICode();
}

/* ════════════════════════════════════════
   STUDIO POLLING
════════════════════════════════════════ */
function startStudioPolling() {
  STATE.pollInterval = setInterval(async () => {
    try {
      const response = await fetch(BACKEND + '/api/ping/' + STATE.token);
      const data = await response.json();

      if (data.connected && !STATE.connected) {
        setStudioConnected(true);
      } else if (!data.connected && STATE.connected) {
        setStudioConnected(false);
      }
    } catch { /* network error, ignore */ }
  }, POLL_INTERVAL_MS);
}

function setStudioConnected(isConnected) {
  STATE.connected = isConnected;

  const dotClass = isConnected ? 'on' : 'wait';
  const pillClass = isConnected ? 'live' : '';

  // Topbar
  el('conn-dot-top').className = 'conn-dot ' + dotClass;
  el('conn-text-top').textContent = isConnected ? 'Studio connected' : 'No plugin';
  el('conn-pill').className = 'conn-pill ' + pillClass;

  // Side panel
  if (el('side-conn-dot')) {
    el('side-conn-dot').className = 'conn-card-dot ' + dotClass;
    el('side-conn-name').textContent = isConnected ? 'Studio connected' : 'Waiting for plugin';
    el('side-conn-desc').textContent = isConnected
      ? 'Commands execute in Roblox Studio.'
      : 'Open Studio and activate your plugin.';
  }

  // Sheet
  if (el('sheet-conn-dot')) {
    el('sheet-conn-dot').className = 'conn-card-dot ' + dotClass;
    el('sheet-conn-name').textContent = isConnected ? 'Studio connected' : 'Waiting for plugin';
    el('sheet-conn-desc').textContent = isConnected
      ? 'Commands execute in Roblox Studio.'
      : 'Open Studio and activate your plugin.';
  }

  if (isConnected) {
    addLogEntry('ok', '🟢 Plugin connected! ENES AI is live and ready.');
    showToast('Studio connected!', 'ok');
  }
}

/* ════════════════════════════════════════
   SHEET (mobile setup panel)
════════════════════════════════════════ */
function openSheet() {
  el('sheet-backdrop').classList.add('open');
  updateSheetToken();
}

function closeSheet() {
  el('sheet-backdrop').classList.remove('open');
}

function handleSheetBackdropClick(e) {
  if (e.target === el('sheet-backdrop')) closeSheet();
}

function updateSheetToken() {
  const t = STATE.token || '—';
  if (el('sheet-token-val')) el('sheet-token-val').textContent = t;
}

/* ════════════════════════════════════════
   TOKEN MANAGEMENT
════════════════════════════════════════ */
function generateToken() {
  return Math.random().toString(36).slice(2, 8).toUpperCase() +
         Math.random().toString(36).slice(2, 8).toUpperCase();
}

function loadToken() {
  let t = localStorage.getItem(TOKEN_STORAGE_KEY);
  if (!t) {
    t = generateToken();
    localStorage.setItem(TOKEN_STORAGE_KEY, t);
  }
  return t;
}

function updateTokenDisplays(token) {
  const short = token.substring(0, 10) + '…';
  if (el('side-token-val')) el('side-token-val').textContent = token;
  if (el('sheet-token-val')) el('sheet-token-val').textContent = token;
  if (el('stat-token-short')) el('stat-token-short').textContent = 'Token: ' + short;
}

/* ════════════════════════════════════════
   INITIALIZATION
════════════════════════════════════════ */
(function init() {
  try {
    // Initialize token
    STATE.token = loadToken();
    updateTokenDisplays(STATE.token);

    // Set boot time
    el('boot-time-el').textContent = ts();

    // Init examples strip
    initExamples();

    // Start polling Studio connection
    startStudioPolling();

    // Log init
    addLogEntry('sys', 'ENES AI v3.0 started. Token: ' + STATE.token.substring(0, 8) + '…');
    addLogEntry('sys', EXAMPLES_DB.length + ' example prompts loaded across terrain, scripts, GUI, game systems.');

    // Hide loading screen
    setTimeout(() => {
      const ls = el('loading-screen');
      ls.classList.add('hidden');
      setTimeout(() => ls.remove(), 500);
    }, 1200);

  } catch(err) {
    console.error('ENES AI init error:', err);
    const ls = el('loading-screen');
    if (ls) {
      ls.classList.add('hidden');
      setTimeout(() => ls.remove(), 400);
    }
  }
})();

</script>
