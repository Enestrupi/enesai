<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Expert Studio Bridge v5.0</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@600;900&display=swap" rel="stylesheet"/>
<style>
:root {
    --bg: #040508; --bg2: #0a0c16; --accent: #00d4ff; --green: #00ffa2; --purple: #bc61ff;
    --text: #e1e4f0; --border: rgba(255,255,255,0.08); --r: 8px;
}
body { background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
.container { display: grid; grid-template-columns: 320px 1fr 300px; width: 100%; }

/* Sidebars */
.sidebar { background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; }
.header { font-family: 'Unbounded'; font-size: 12px; color: var(--accent); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }

/* Editor */
.main-content { display: flex; flex-direction: column; background: var(--bg); }
.toolbar { padding: 10px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
.code-editor { flex: 1; background: transparent; border: none; padding: 20px; color: #fff; font-size: 14px; outline: none; resize: none; line-height: 1.6; }

/* Expert Buttons */
.btn { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: var(--r); cursor: pointer; font-size: 11px; transition: 0.2s; }
.btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 10px rgba(0,212,255,0.2); }
.btn-deploy { background: var(--accent); color: #000; font-weight: bold; border: none; }
.btn-deploy:hover { background: #fff; }

.status { font-size: 10px; padding: 5px 10px; border-radius: 20px; background: rgba(0,255,162,0.1); color: var(--green); }
.input-box { background: var(--bg); border: 1px solid var(--border); padding: 12px; border-radius: var(--r); color: white; width: 100%; box-sizing: border-box; margin-top: auto; }
</style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div class="header">Expert AI Brain</div>
        <p style="font-size: 10px; color: #666;">SELECT ARCHITECTURE:</p>
        <button class="btn" onclick="setMode('AdminConsole')">⚡ Admin Console (Full Set)</button>
        <button class="btn" onclick="setMode('LemonadeUI')">💎 4K Lemonade UI</button>
        <button class="btn" onclick="setMode('SmartNPC')">🤖 Combat NPC</button>
        <button class="btn" onclick="setMode('TerrainGen')">🌍 Voxel Terrain</button>
        
        <div id="log" style="font-size: 10px; margin-top: 20px; color: var(--purple);">System Ready...</div>
        
        <textarea id="user-prompt" class="input-box" placeholder="Ask for advanced scripting..."></textarea>
        <button class="btn-deploy" style="margin-top: 10px; padding: 12px;" onclick="generateCode()">Generate Expert Logic</button>
    </div>

    <div class="main-content">
        <div class="toolbar">
            <div id="current-file" style="font-size: 11px; color: var(--accent);">Script: ServerMain.lua</div>
            <div class="status" id="bridge-status">BRIDGE: ONLINE</div>
            <button class="btn btn-deploy" style="margin-left: auto;" onclick="autoInsert()">AUTO-INSERT TO STUDIO</button>
        </div>
        <textarea id="editor" class="code-editor">-- Expert AI waiting for prompt...</textarea>
    </div>

    <div class="sidebar" style="border-left: 1px solid var(--border); border-right: none;">
        <div class="header">3D & Assets</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="btn" onclick="addAsset('Tree')">Model Tree</div>
            <div class="btn" onclick="addAsset('Building')">Model House</div>
        </div>
    </div>
</div>

<script>
let currentMode = "Server";
let generatedScripts = {};

function setMode(mode) {
    document.getElementById('log').innerText = "Mode set to: " + mode;
    if(mode === 'AdminConsole') {
        document.getElementById('editor').value = `-- [EXPERT] SERVER ADMIN HANDLER\nlocal Remote = Instance.new("RemoteEvent", game.ReplicatedStorage)\nRemote.Name = "AdminRemote"\n\nRemote.OnServerEvent:Connect(function(player, cmd, target)\n    -- Expert validation logic here\nend)`;
    }
}

async function autoInsert() {
    const status = document.getElementById('bridge-status');
    status.innerText = "SENDING...";

    const payload = {
        code: document.getElementById('editor').value,
        type: currentMode, // Script, LocalScript, or ModuleScript
        name: "ExpertGenerated_" + Date.now(),
        is4K: true,
        isAdvanced: true
    };

    try {
        // This connects to the Bridge (default port 8080)
        const response = await fetch('http://localhost:8080/insert', {
            method: 'POST',
            body: JSON.stringify(payload),
            headers: { 'Content-Type': 'application/json' }
        });
        
        if (response.ok) {
            status.innerText = "SUCCESS ✓";
            setTimeout(() => status.innerText = "BRIDGE: ONLINE", 2000);
        }
    } catch (e) {
        status.innerText = "ERROR: NO PLUGIN";
        status.style.color = "red";
    }
}

function generateCode() {
    document.getElementById('log').innerText = "AI is thinking in 4K resolution...";
    // In a real setup, this would call your AI API. 
    // Here we simulate the expert logic you asked for:
    document.getElementById('editor').value = `-- EXPERT MODULE: 4K UI + REMOTE EVENTS\nlocal Module = {}\n\nfunction Module:CreateUI()\n    local Screen = Instance.new("ScreenGui")\n    local Frame = Instance.new("Frame", Screen)\n    Instance.new("UICorner", Frame).CornerRadius = UDim.new(0, 12)\n    Instance.new("UIStroke", Frame).Thickness = 2.5\n    return Screen\nend\n\nreturn Module`;
}
</script>
</body>
</html>
