<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>ENES AI</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Syne:wght@800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#010306;color:#e8d5c0;font-family:'JetBrains Mono',monospace;font-size:13px;overflow:hidden}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:rgba(255,140,0,0.3)}

/* BG */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,140,0,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,140,0,0.04) 1px,transparent 1px);background-size:44px 44px}
.bg-g1{position:absolute;top:-30%;left:-20%;width:80%;height:80%;background:radial-gradient(ellipse,rgba(255,140,0,0.07) 0%,transparent 60%);animation:f1 22s ease-in-out infinite alternate}
.bg-g2{position:absolute;bottom:-30%;right:-20%;width:70%;height:70%;background:radial-gradient(ellipse,rgba(0,170,255,0.05) 0%,transparent 60%);animation:f2 28s ease-in-out infinite alternate}
@keyframes f1{to{transform:translate(6%,4%) scale(1.12)}}
@keyframes f2{to{transform:translate(-5%,-7%) scale(1.18)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes glow{0%,100%{box-shadow:0 0 8px #ff8c00,0 0 16px rgba(255,140,0,.2)}50%{box-shadow:0 0 18px #ff8c00,0 0 36px rgba(255,140,0,.4)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes dot{0%,100%{transform:scale(.4);opacity:.3}50%{transform:scale(1);opacity:1}}
@keyframes slide{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}

/* ROOT */
#app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column}

/* TOPBAR */
.bar{height:54px;background:rgba(1,3,6,.95);backdrop-filter:blur(16px);border-bottom:0.5px solid rgba(255,140,0,.1);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;position:relative}
.bar::after{content:’’;position:absolute;bottom:0;inset-x:0;height:1px;background:linear-gradient(90deg,transparent,#ff8c00,rgba(255,140,0,.3),transparent);opacity:.5}
.logo{font-family:‘Syne’,sans-serif;font-size:20px;font-weight:900;background:linear-gradient(135deg,#ff8c00,#ffcc44);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:flex;align-items:center;gap:8px}
.logo-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#ff8c00,#ffcc44);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#010306;animation:glow 3s ease-in-out infinite;flex-shrink:0;-webkit-text-fill-color:#010306}
.conn-pill{display:flex;align-items:center;gap:6px;padding:5px 11px;background:#07101e;border:0.5px solid rgba(255,140,0,.1);border-radius:20px;font-size:10px;color:#7a5c44;margin-left:auto;transition:all .3s}
.conn-pill.live{border-color:rgba(0,255,170,.25);background:rgba(0,255,170,.04);color:#00ffaa}
.cdot{width:6px;height:6px;border-radius:50%;background:#3a2518;flex-shrink:0;transition:all .3s}
.cdot.on{background:#00ffaa;box-shadow:0 0 8px rgba(0,255,170,.5)}
.cdot.wait{background:#ff8c00;animation:blink 1.3s ease-in-out infinite}
.setup-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;background:#07101e;border:0.5px solid rgba(255,140,0,.15);border-radius:8px;font-size:11px;color:#7a5c44;cursor:pointer;font-family:‘JetBrains Mono’,monospace;font-weight:700;transition:all .15s}
.setup-btn:hover{border-color:rgba(255,140,0,.4);color:#ff8c00}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* INPUT ZONE */
.izone{padding:12px 14px 10px;flex-shrink:0;background:#010306;border-bottom:0.5px solid rgba(255,140,0,.06)}
.ihead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ititle{font-family:‘Syne’,sans-serif;font-size:15px;font-weight:900;background:linear-gradient(135deg,#ff8c00,#ffcc44);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:flex;align-items:center;gap:7px}
.ititle-dot{width:7px;height:7px;border-radius:50%;background:#ff8c00;box-shadow:0 0 10px #ff8c00;animation:glow 2.5s ease-in-out infinite;flex-shrink:0}
.model-tag{display:flex;align-items:center;gap:5px;padding:4px 10px;background:#07101e;border:0.5px solid rgba(255,140,0,.12);border-radius:20px;font-size:10px;color:#7a5c44}
.model-tag-dot{width:5px;height:5px;border-radius:50%;background:#00ffaa}

/* TEXTAREA */
.txtarea{width:100%;background:#07101e;border:0.5px solid rgba(255,140,0,.18);border-radius:10px;padding:13px;font-family:‘JetBrains Mono’,monospace;font-size:14px;color:#e8d5c0;outline:none;resize:none;min-height:110px;max-height:180px;line-height:1.65;transition:border-color .25s,box-shadow .25s;display:block;-webkit-appearance:none}
.txtarea:focus{border-color:#ff8c00;box-shadow:0 0 0 2px rgba(255,140,0,.18),0 0 24px rgba(255,140,0,.12)}
.txtarea::placeholder{color:#3a2518;line-height:1.7}
.txt-footer{display:flex;align-items:center;justify-content:space-between;padding:5px 2px 0;font-size:10px;color:#3a2518}
.txt-footer-right{display:flex;align-items:center;gap:4px}
.txt-pip{width:4px;height:4px;border-radius:50%;background:#00ffaa}

/* AI STATE */
.ai-wrap{display:none;flex-direction:column;gap:6px;margin:8px 0 0;animation:up .2s ease}
.ai-wrap.show{display:flex}
.think{display:flex;align-items:center;gap:10px;padding:10px 13px;background:rgba(255,140,0,.06);border:0.5px solid rgba(255,140,0,.18);border-radius:10px;font-size:12px;color:#ff8c00;position:relative;overflow:hidden}
.think::after{content:’’;position:absolute;bottom:0;left:-100%;width:100%;height:1px;background:linear-gradient(90deg,transparent,#ff8c00,#ffcc44,transparent);animation:slide-line 1.8s ease-in-out infinite}
@keyframes slide-line{0%{left:-100%}100%{left:100%}}
.tdots{display:flex;gap:4px}
.tdots span{width:5px;height:5px;background:#ff8c00;border-radius:50%;animation:dot 1s ease-in-out infinite;display:block}
.tdots span:nth-child(2){animation-delay:.17s}.tdots span:nth-child(3){animation-delay:.34s}
.tspinner{width:14px;height:14px;border:1.5px solid rgba(255,140,0,.2);border-top-color:#ff8c00;border-radius:50%;animation:spin .75s linear infinite;margin-left:auto;flex-shrink:0}
.preview{background:#07101e;border:0.5px solid rgba(255,140,0,.22);border-radius:10px;overflow:hidden;animation:up .2s ease}
.prev-head{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(255,140,0,.07);border-bottom:0.5px solid rgba(255,140,0,.1)}
.prev-lbl{font-size:10px;color:#ff8c00;font-weight:700;text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;gap:6px}
.prev-lbl::before{content:’’;width:6px;height:6px;border-radius:50%;background:#ff8c00;box-shadow:0 0 8px #ff8c00;flex-shrink:0}
.cpybtn{padding:3px 8px;background:#101828;border:0.5px solid rgba(255,140,0,.18);border-radius:4px;font-size:10px;color:#7a5c44;cursor:pointer;transition:all .15s;font-family:‘JetBrains Mono’,monospace}
.cpybtn:hover{border-color:rgba(255,140,0,.4);color:#ff8c00}
.prev-code{padding:10px 12px;font-size:11px;color:#c8a888;white-space:pre-wrap;word-break:break-all;max-height:140px;overflow-y:auto;line-height:1.6}
.prev-note{padding:8px 12px;border-top:0.5px solid rgba(255,140,0,.07);font-size:11px;color:#7a5c44;line-height:1.55;background:rgba(0,0,0,.2);display:flex;gap:6px}

/* ACTIONS */
.actions{display:flex;gap:8px;margin-top:10px}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:11px 14px;border-radius:10px;font-family:‘JetBrains Mono’,monospace;font-size:12px;font-weight:700;cursor:pointer;transition:all .18s;border:0.5px solid rgba(255,140,0,.18);-webkit-appearance:none}
.btn:active{transform:scale(.95)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.btn-x{background:#07101e;color:#7a5c44}
.btn-x:hover{border-color:rgba(255,51,85,.5);color:#ff3355}
.btn-retry{background:#07101e;color:#7a5c44;display:none}
.btn-retry:hover{border-color:rgba(255,140,0,.4);color:#ff8c00}
.btn-go{background:linear-gradient(135deg,#ff8c00,#ffcc44);color:#010306;border-color:transparent;font-weight:800;flex:1;font-size:13px;box-shadow:0 2px 16px rgba(255,140,0,.25)}
.btn-go:hover{box-shadow:0 4px 28px rgba(255,140,0,.45);transform:translateY(-1px)}
.btn-go.send{background:linear-gradient(135deg,#00aaff,#44ccff);box-shadow:0 2px 16px rgba(0,170,255,.25)}

/* EXAMPLES */
.ex-wrap{border-top:0.5px solid rgba(255,140,0,.06);flex-shrink:0;padding:7px 0 5px}
.ex-lbl{font-size:9px;color:#3a2518;letter-spacing:.12em;text-transform:uppercase;padding:0 14px;margin-bottom:6px}
.ex-scroll{display:flex;gap:6px;overflow-x:auto;padding:0 14px 2px;-webkit-overflow-scrolling:touch}
.ex-scroll::-webkit-scrollbar{display:none}
.ex-chip{display:inline-flex;align-items:center;padding:6px 12px;background:#07101e;border:0.5px solid rgba(255,140,0,.1);border-radius:20px;font-size:11px;color:#7a5c44;cursor:pointer;font-family:‘JetBrains Mono’,monospace;font-weight:700;white-space:nowrap;flex-shrink:0;transition:all .15s}
.ex-chip:active{transform:scale(.93)}
.ex-chip:hover{border-color:rgba(255,140,0,.35);color:#ff8c00;background:rgba(255,140,0,.06)}

/* LOG */
.log-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.log-head{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;border-top:0.5px solid rgba(255,140,0,.06);flex-shrink:0;background:#010306}
.log-title{font-size:10px;font-weight:700;color:#7a5c44;letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.log-pip{width:6px;height:6px;border-radius:50%;background:#ff8c00;box-shadow:0 0 8px #ff8c00;animation:blink 2s ease-in-out infinite}
.log-cnt{font-size:10px;color:#3a2518}
.log-clr{padding:2px 7px;background:none;border:0.5px solid rgba(255,140,0,.1);border-radius:4px;font-size:10px;color:#3a2518;cursor:pointer;font-family:‘JetBrains Mono’,monospace;transition:all .15s}
.log-clr:hover{border-color:rgba(255,51,85,.4);color:#ff3355}
.log-body{flex:1;overflow-y:auto;padding:8px 14px;display:flex;flex-direction:column;gap:5px;-webkit-overflow-scrolling:touch}
.le{padding:8px 10px;border-radius:10px;border-left:2px solid #3a2518;background:#07101e;animation:up .15s ease}
.le.ai{border-left-color:#ff8c00}
.le.sent{border-left-color:#00aaff}
.le.ok{border-left-color:#00ffaa}
.le.err{border-left-color:#ff3355}
.le.sys{border-left-color:#3a2518}
.le-top{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.le-tag{font-size:9px;padding:1px 6px;border-radius:3px;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.le-tag.ai{background:rgba(255,140,0,.1);color:#ff8c00}
.le-tag.sent{background:rgba(0,170,255,.08);color:#00aaff}
.le-tag.ok{background:rgba(0,255,170,.08);color:#00ffaa}
.le-tag.err{background:rgba(255,51,85,.08);color:#ff3355}
.le-tag.sys{background:#101828;color:#3a2518}
.le-time{font-size:10px;color:#3a2518;margin-left:auto}
.le-msg{font-size:11px;color:#7a5c44;line-height:1.55;word-break:break-all}

/* SHEET */
.sh-bg{position:fixed;inset:0;background:rgba(1,3,6,.9);backdrop-filter:blur(12px);display:flex;align-items:flex-end;justify-content:center;z-index:500;opacity:0;pointer-events:none;transition:opacity .25s}
.sh-bg.open{opacity:1;pointer-events:all}
.sh{background:#07101e;border:0.5px solid rgba(255,140,0,.2);border-radius:20px 20px 0 0;padding:18px 18px 36px;width:100%;max-width:520px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);position:relative;max-height:90vh;overflow-y:auto}
.sh-bg.open .sh{transform:translateY(0)}
.sh::before{content:’’;position:absolute;top:0;inset-x:0;height:1px;background:linear-gradient(90deg,transparent,#ff8c00,rgba(255,140,0,.3),transparent);opacity:.5}
.sh-handle{width:40px;height:4px;background:#101828;border-radius:2px;margin:0 auto 16px}
.sh-x{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:50%;background:#101828;border:0.5px solid rgba(255,140,0,.15);display:flex;align-items:center;justify-content:center;font-size:12px;color:#7a5c44;cursor:pointer;transition:all .15s}
.sh-x:hover{border-color:rgba(255,51,85,.4);color:#ff3355}
.sh-title{font-family:‘Syne’,sans-serif;font-size:18px;font-weight:900;background:linear-gradient(135deg,#ff8c00,#ffcc44);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.sh-sub{font-size:12px;color:#7a5c44;margin-bottom:16px;line-height:1.6}
.sh-sec{font-size:9px;font-weight:700;color:#3a2518;letter-spacing:.12em;text-transform:uppercase;margin:16px 0 8px;display:flex;align-items:center;gap:7px}
.sh-sec::after{content:’’;flex:1;height:0.5px;background:linear-gradient(90deg,rgba(255,140,0,.15),transparent)}
.tok-box{background:#101828;border:0.5px solid rgba(255,140,0,.15);border-radius:10px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.tok-lbl{font-size:9px;color:#3a2518;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
.tok-val{font-size:12px;color:#ff8c00;font-weight:700;word-break:break-all}
.tok-copy{padding:6px 10px;background:#07101e;border:0.5px solid rgba(255,140,0,.18);border-radius:6px;font-size:10px;color:#7a5c44;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;font-family:‘JetBrains Mono’,monospace}
.tok-copy:hover{border-color:rgba(255,140,0,.4);color:#ff8c00}
.step{display:flex;gap:9px;margin-bottom:10px;align-items:flex-start}
.step-n{width:20px;height:20px;border-radius:50%;background:#101828;border:0.5px solid rgba(255,140,0,.15);font-size:10px;color:#3a2518;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-t{font-size:12px;color:#e8d5c0;font-weight:700;margin-bottom:2px}
.step-d{font-size:11px;color:#7a5c44;line-height:1.5}
.step-d code{background:#101828;border-radius:3px;padding:1px 5px;color:#ff8c00;font-size:10px}
.step-code{background:#101828;border:0.5px solid rgba(255,140,0,.12);border-radius:6px;padding:6px 40px 6px 9px;margin-top:4px;font-size:10px;color:#ff8c00;word-break:break-all;position:relative}
.step-cp{position:absolute;top:4px;right:5px;padding:2px 6px;background:none;border:0.5px solid rgba(255,140,0,.15);border-radius:3px;font-size:9px;color:#3a2518;cursor:pointer;font-family:‘JetBrains Mono’,monospace;transition:all .15s}
.step-cp:hover{border-color:rgba(255,140,0,.4);color:#ff8c00}

/* TOASTS */
#toasts{position:fixed;bottom:18px;left:12px;right:12px;display:flex;flex-direction:column;gap:6px;z-index:9999;pointer-events:none}
.toast{display:flex;align-items:center;gap:9px;padding:10px 14px;background:#07101e;border:0.5px solid rgba(255,140,0,.2);border-radius:10px;font-size:12px;animation:up .2s ease;pointer-events:auto;box-shadow:0 8px 28px rgba(0,0,0,.5)}
.toast.ok{border-left:2px solid #00ffaa}.toast.err{border-left:2px solid #ff3355}.toast.info{border-left:2px solid #00aaff}.toast.ai{border-left:2px solid #ff8c00;background:rgba(255,140,0,.04)}
</style>

</head>

<script>
const B='https://enesai-production.up.railway.app';
let tok=null,connected=false,pollInt=null,genCode=null,ready=false,gen=false,send=false,lc=0,rc=0;
const $=id=>document.getElementById(id);
const ts=()=>new Date().toLocaleTimeString('en-US',{hour12:false});

function toast(m,t='info'){
  const c=$('toasts'),e=document.createElement('div');
  e.className='toast '+t;e.textContent=m;c.appendChild(e);

const THINKS=['Analyzing your request…','Crafting expert Lua…','Building your world…','Writing scripts…','Generating terrain…','Almost ready…'];

async function go(){
  if(ready){await sendCode();}else{await genAI();}
}

async function genAI(){
  const p=$('txta').value.trim();
  if(!p){toast('Tell ENES AI what to build!','info');return;}
  if(gen)return;gen=true;
  $('aiwrap').classList.add('show');
  $('tbar').style.display='flex';
  $('prev').style.display='none';
  $('mainbtn').disabled=true;
  $('mainbtn').textContent='✦ Thinking…';
  $('retrybtn').style.display='none';
  $('hlabel').textContent='ENES AI is generating…';
  rc++;
  let ti=0;
  const ti2=setInterval(()=>{$('tmsg').textContent=THINKS[ti++%THINKS.length]},850);
  log('ai',`Request: "${p.substring(0,80)}${p.length>80?'…':''}"`);
  try{
    const r=await fetch(B+'/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:p,system:SYS})});
    clearInterval(ti2);
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||'HTTP '+r.status);}
    const d=await r.json();
    const raw=(d.content&&d.content[0])?d.content[0].text:'';
    if(!raw)throw new Error('Empty response');
    let parsed;
    try{parsed=JSON.parse(raw.replace(/^```json\s*/i,'').replace(/^```\s*/i,'').replace(/\s*```\s*$/,'').trim());}
    catch{parsed={lua:raw,explanation:'Generated Lua code.',complexity:'medium'};}
    genCode=parsed.lua||raw;
    $('tbar').style.display='none';
    $('prev').style.display='block';
    $('pcode').textContent=genCode;
    $('pnote').textContent=parsed.explanation||'Ready to send.';
    ready=true;
    $('mainbtn').disabled=false;
    $('mainbtn').textContent='▶ Send to Studio';
    $('mainbtn').className='btn btn-go send';
    $('retrybtn').style.display='flex';
    $('hlabel').textContent='Code ready! Tap Send.';
    const icons={simple:'⚡',medium:'🔥',complex:'💎',epic:'🌟'};
    log('ok',(icons[parsed.complexity]||'✦')+' '+(parsed.explanation||'Code generated.'));
    toast('Code ready — tap Send!','ai');
  }catch(e){
    clearInterval(ti2);
    $('tbar').style.display='none';
    $('aiwrap').classList.remove('show');
    $('mainbtn').disabled=false;
    $('mainbtn').textContent='✦ Generate & Send';
    $('mainbtn').className='btn btn-go';
    $('hlabel').textContent='Free & instant via Groq';
    log('err','Error: '+e.message);
    toast('Error: '+e.message,'err');
  }
  gen=false;
}

async function sendCode(){
  if(!genCode||send)return;send=true;
  $('mainbtn').disabled=true;$('mainbtn').textContent='⟳ Sending…';
  log('sent','Sending to Studio…');
  try{
    const r=await fetch(B+'/api/command',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:tok,type:'run_script',body:genCode})});
    const d=await r.json();
    if(!d.ok)throw new Error(d.error||'Server error');
    let res=null;
    for(let i=0;i<15;i++){
      await new Promise(r=>setTimeout(r,1000));
      try{const rr=await fetch(B+'/api/result/'+tok);const rd=await rr.json();if(rd.ready){res=rd;break;}}catch{}
    }
    if(res){
      if(res.success){log('ok','✅ '+(res.output||'Done!'));toast('Done! Check Studio.','ok');}
      else{log('err','❌ '+res.output);toast('Studio error.','err');}
    }else{log('err','No response — is plugin connected?');toast('No response from Studio.','info');}
  }catch(e){log('err','Send failed: '+e.message);toast('Failed: '+e.message,'err');}
  send=false;resetState();
}

function resetState(){
  genCode=null;ready=false;
  $('mainbtn').disabled=false;$('mainbtn').textContent='✦ Generate & Send';$('mainbtn').className='btn btn-go';
  $('retrybtn').style.display='none';
  $('prev').style.display='none';$('tbar').style.display='none';
  $('aiwrap').classList.remove('show');
  $('txta').value='';$('ccount').textContent='0 chars';
  $('hlabel').textContent='Free & instant via Groq';
}
function clearAll(){resetState();}

function setConn(v){

  if(v){toast('Studio connected!','ok');log('ok','Plugin connected! ENES AI is live.');}
}

function startPoll(){
  pollInt=setInterval(async()=>{
    try{const r=await fetch(B+'/api/ping/'+tok);const d=await r.json();
    if(d.connected&&!connected)setConn(true);
    if(!d.connected&&connected)setConn(false);}catch{}
  },2000);
}
