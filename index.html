<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Enes's AI</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --sidebar: #0d0d15;
  --panel: #111120;
  --panel2: #161628;
  --cyan: #00ffea;
  --pink: #ff006e;
  --yellow: #ffe600;
  --green: #00ff88;
  --white: #e8f0ff;
  --dim: #2a3550;
  --dim2: #3a4560;
  --border: rgba(0,255,234,0.08);
  --border2: rgba(0,255,234,0.15);
  --glow: 0 0 20px rgba(0,255,234,0.3);
  --glow-pink: 0 0 20px rgba(255,0,110,0.3);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--white);font-family:'Exo 2',sans-serif;height:100vh;overflow:hidden;}
body::after{content:'';position:fixed;inset:0;z-index:9998;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);}
.bg-fx{position:fixed;inset:0;z-index:0;pointer-events:none;}
.bg-fx::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 50% 40% at 70% 50%,rgba(0,255,234,0.04) 0%,transparent 70%),radial-gradient(ellipse 30% 40% at 20% 80%,rgba(255,0,110,0.03) 0%,transparent 70%);}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(0,255,234,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,234,0.02) 1px,transparent 1px);background-size:50px 50px;}

/* LAYOUT */
.app{position:relative;z-index:1;display:grid;grid-template-columns:240px 1fr;height:100vh;overflow:hidden;}

/* SIDEBAR */
.sidebar{background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;z-index:10;}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.sb-logo-icon{font-size:22px;filter:drop-shadow(0 0 8px var(--cyan));animation:iconPulse 3s ease-in-out infinite;}
.sb-logo-text{font-family:'Orbitron',monospace;font-weight:900;font-size:14px;letter-spacing:3px;background:linear-gradient(90deg,var(--cyan),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sb-logo-v{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--dim2);margin-left:auto;border:1px solid var(--dim);padding:1px 5px;border-radius:2px;}
.sb-new-btn{margin:12px 12px 8px;padding:9px 14px;background:transparent;border:1px solid var(--border2);border-radius:8px;color:rgba(255,255,255,0.5);font-family:'Exo 2',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:8px;}
.sb-new-btn:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,255,234,0.04);}
.sb-new-btn::before{content:'+';font-size:16px;font-weight:300;}
.sb-content{flex:1;overflow-y:auto;padding-bottom:8px;}
.sb-content::-webkit-scrollbar{width:3px;}
.sb-content::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px;}
.sb-section{padding:6px 12px 4px;}
.sb-section-title{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--dim2);text-transform:uppercase;padding:6px 4px 4px;}
.sb-item{padding:8px 10px;border-radius:6px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:2px;border:1px solid transparent;}
.sb-item:hover{background:rgba(0,255,234,0.05);color:rgba(255,255,255,0.7);}
.sb-item.active{background:rgba(0,255,234,0.08);color:var(--cyan);border-color:rgba(0,255,234,0.15);}
.sb-item-icon{font-size:14px;width:18px;text-align:center;}

/* KEY CARD in sidebar */
.sb-key-card{margin:10px 12px;padding:12px;background:rgba(0,255,234,0.05);border:1px solid rgba(0,255,234,0.15);border-radius:10px;}
.sb-key-title{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--cyan);text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.sb-key-title::before{content:'//';color:var(--pink);}
.sb-key-value{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--cyan);word-break:break-all;margin-bottom:8px;line-height:1.5;}
.sb-key-status{display:flex;align-items:center;gap:6px;font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--green);letter-spacing:1px;text-transform:uppercase;}
.sb-key-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:dotBlink 2s infinite;}
.sb-regen-btn{width:100%;margin-top:8px;padding:6px;background:transparent;border:1px solid var(--dim2);border-radius:6px;color:var(--dim2);font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;}
.sb-regen-btn:hover{border-color:var(--cyan);color:var(--cyan);}

.sb-bottom{padding:10px 12px;border-top:1px solid var(--border);margin-top:auto;}
.sb-discord{padding:8px 12px;background:rgba(88,101,242,0.15);border:1px solid rgba(88,101,242,0.3);border-radius:8px;color:#8b9bff;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:8px;text-decoration:none;}
.sb-discord:hover{background:rgba(88,101,242,0.25);}

/* MAIN */
.main{position:relative;display:flex;flex-direction:column;overflow:hidden;}
.topbar{padding:12px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(10,10,15,0.8);backdrop-filter:blur(20px);flex-shrink:0;}
.tb-left{display:flex;align-items:center;gap:10px;}
.tb-key-preview{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--dim2);text-transform:uppercase;display:flex;align-items:center;gap:6px;}
.tb-right{display:flex;align-items:center;gap:12px;}
.tb-online{display:flex;align-items:center;gap:6px;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--cyan);text-transform:uppercase;}
.tb-dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 6px var(--cyan);animation:dotBlink 2s infinite;}
.tb-plugin-btn{padding:8px 16px;background:linear-gradient(135deg,#00cc88,#00aa66);border:none;border-radius:8px;color:#000;font-family:'Exo 2',sans-serif;font-size:11px;font-weight:800;letter-spacing:1px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;}
.tb-plugin-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,200,130,0.4);}

/* PAGES */
.page{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}
.page.hidden{display:none;}

/* HOME PAGE */
#homePage{position:relative;}
.float-cards{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.float-card{position:absolute;width:110px;height:75px;border-radius:10px;border:1px solid var(--border2);background:var(--panel);overflow:hidden;opacity:0.45;animation:floatCard ease-in-out infinite alternate;}
.float-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,255,234,0.08),rgba(255,0,110,0.08));}
.fc1{top:12%;left:6%;animation-duration:4s;}
.fc2{top:8%;right:10%;animation-duration:5s;animation-delay:1s;}
.fc3{bottom:22%;left:4%;animation-duration:4.5s;animation-delay:0.5s;}
.fc4{bottom:18%;right:6%;animation-duration:3.5s;animation-delay:1.5s;}
.fc5{bottom:8%;left:28%;animation-duration:5s;animation-delay:2s;width:95px;height:65px;}
.fc-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:26px;}
.home-center{text-align:center;z-index:1;padding:0 20px;width:100%;max-width:580px;}
.home-title{font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(18px,3vw,30px);letter-spacing:2px;color:var(--white);margin-bottom:8px;line-height:1.2;}
.home-title span{background:linear-gradient(90deg,var(--cyan),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.home-sub{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--dim2);text-transform:uppercase;margin-bottom:28px;}
.home-input-wrap{position:relative;margin-bottom:14px;}
.home-input{width:100%;background:var(--panel);border:1px solid var(--border2);border-radius:12px;color:var(--white);font-family:'Exo 2',sans-serif;font-size:15px;padding:16px 52px 16px 20px;outline:none;transition:all 0.25s;}
.home-input:focus{border-color:var(--cyan);box-shadow:var(--glow);}
.home-input::placeholder{color:var(--dim2);}
.home-send{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:36px;height:36px;background:var(--cyan);border:none;border-radius:8px;color:#000;font-size:16px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;}
.home-send:hover{background:var(--pink);box-shadow:var(--glow-pink);}
.home-chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.home-chip{padding:6px 14px;background:transparent;border:1px solid var(--border2);border-radius:20px;color:rgba(255,255,255,0.35);font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;}
.home-chip:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,255,234,0.05);}

/* CHAT PAGE */
#chatPage{align-items:stretch;justify-content:flex-start;}
.chat-msgs{flex:1;overflow-y:auto;padding:20px 28px;display:flex;flex-direction:column;gap:14px;}
.chat-msgs::-webkit-scrollbar{width:3px;}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px;}
.msg{display:flex;gap:12px;animation:msgIn 0.3s ease;}
.msg.user{flex-direction:row-reverse;align-self:flex-end;max-width:75%;}
.msg.ai{align-self:flex-start;max-width:80%;}
.msg-av{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;font-family:'Share Tech Mono',monospace;}
.msg.ai .msg-av{background:rgba(0,255,234,0.08);border:1px solid rgba(0,255,234,0.2);color:var(--cyan);}
.msg.user .msg-av{background:rgba(255,0,110,0.08);border:1px solid rgba(255,0,110,0.2);color:var(--pink);}
.msg-body{display:flex;flex-direction:column;gap:6px;}
.msg-bubble{padding:11px 15px;border-radius:10px;font-size:13px;line-height:1.65;}
.msg.ai .msg-bubble{background:var(--panel);border:1px solid rgba(0,255,234,0.1);color:var(--white);border-top-left-radius:2px;}
.msg.user .msg-bubble{background:rgba(255,0,110,0.08);border:1px solid rgba(255,0,110,0.15);color:var(--white);border-top-right-radius:2px;}
.msg-code{background:rgba(0,0,0,0.6);border:1px solid rgba(0,255,234,0.15);border-radius:8px;padding:14px 16px;font-family:'Share Tech Mono',monospace;font-size:11px;line-height:1.8;color:#7affb2;white-space:pre-wrap;word-break:break-word;max-height:280px;overflow-y:auto;}
.msg-code::-webkit-scrollbar{width:3px;}
.msg-code::-webkit-scrollbar-thumb{background:var(--dim);}
.confirm-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
.cbtn{padding:7px 16px;border-radius:6px;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;border:none;}
.cbtn-yes{background:transparent;border:1px solid var(--cyan);color:var(--cyan);}
.cbtn-yes:hover{background:var(--cyan);color:#000;box-shadow:var(--glow);}
.cbtn-no{background:transparent;border:1px solid var(--dim2);color:var(--dim2);}
.cbtn-no:hover{border-color:var(--pink);color:var(--pink);}
.cbtn-mod{background:transparent;border:1px solid rgba(255,230,0,0.3);color:var(--yellow);}
.cbtn-mod:hover{background:rgba(255,230,0,0.08);}
.typing{display:flex;align-items:center;gap:5px;padding:12px 15px;background:var(--panel);border:1px solid rgba(0,255,234,0.1);border-radius:10px;border-top-left-radius:2px;width:fit-content;}
.td{width:5px;height:5px;border-radius:50%;background:var(--cyan);animation:typingBounce 1.2s ease-in-out infinite;}
.td:nth-child(2){animation-delay:0.2s;}
.td:nth-child(3){animation-delay:0.4s;}
.chat-input-area{padding:12px 28px 16px;border-top:1px solid var(--border);background:rgba(10,10,15,0.9);backdrop-filter:blur(10px);flex-shrink:0;}
.chat-input-wrap{position:relative;}
.chat-input{width:100%;background:var(--panel);border:1px solid var(--border2);border-radius:12px;color:var(--white);font-family:'Exo 2',sans-serif;font-size:14px;padding:13px 50px 13px 18px;outline:none;transition:all 0.2s;resize:none;min-height:48px;max-height:120px;line-height:1.5;}
.chat-input:focus{border-color:var(--cyan);box-shadow:var(--glow);}
.chat-input::placeholder{color:var(--dim2);}
.chat-send{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:34px;height:34px;background:var(--cyan);border:none;border-radius:8px;color:#000;font-size:15px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;}
.chat-send:hover{background:var(--pink);box-shadow:var(--glow-pink);}

/* ANIMATIONS */
@keyframes iconPulse{0%,100%{filter:drop-shadow(0 0 10px var(--cyan))}50%{filter:drop-shadow(0 0 22px var(--cyan)) drop-shadow(0 0 40px var(--pink))}}
@keyframes dotBlink{0%,100%{opacity:1}50%{opacity:0.2}}
@keyframes floatCard{from{transform:translateY(0) rotate(-1deg)}to{transform:translateY(-12px) rotate(1deg)}}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

@media(max-width:700px){
  .app{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .chat-msgs{padding:14px;}
  .chat-input-area{padding:10px 14px 14px;}
  .float-card{display:none;}
}
</style>
</head>
<body>
<div class="bg-fx"></div>
<div class="bg-grid"></div>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-logo">
      <span class="sb-logo-icon">⚡</span>
      <span class="sb-logo-text">ENES'S AI</span>
      <span class="sb-logo-v">V4</span>
    </div>

    <button class="sb-new-btn" onclick="showHome()">New Project</button>

    <div class="sb-content">
      <div class="sb-section">
        <div class="sb-section-title">Navigation</div>
        <div class="sb-item active" onclick="showHome()"><span class="sb-item-icon">🏠</span> Home</div>
        <div class="sb-item" onclick="startChat('make me a double jump script')"><span class="sb-item-icon">📝</span> Scripts</div>
        <div class="sb-item" onclick="startChat('create a beautiful GUI')"><span class="sb-item-icon">🎨</span> GUI Builder</div>
        <div class="sb-item" onclick="startChat('make an admin console')"><span class="sb-item-icon">⚙️</span> Admin Tools</div>
      </div>

      <div class="sb-section">
        <div class="sb-section-title">Recent</div>
        <div id="recentList">
          <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--dim2);padding:6px 4px;letter-spacing:1px;">NO HISTORY YET</div>
        </div>
      </div>

      <!-- KEY CARD -->
      <div class="sb-section">
        <div class="sb-section-title">Your API Key</div>
        <div class="sb-key-card">
          <div class="sb-key-title">Key</div>
          <div class="sb-key-value" id="sidebarKey">Generating...</div>
          <div class="sb-key-status"><span class="sb-key-dot"></span> Active</div>
          <button class="sb-regen-btn" onclick="regenKey()">↺ Regenerate</button>
        </div>
      </div>
    </div>

    <div class="sb-bottom">
      <a class="sb-discord" href="#" target="_blank"><span>💬</span> Join Discord</a>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <!-- Topbar -->
    <div class="topbar">
      <div class="tb-left">
        <div class="tb-key-preview">⚡ <span id="topbarKey" style="color:var(--cyan);"></span></div>
      </div>
      <div class="tb-right">
        <div class="tb-online"><span class="tb-dot"></span> ONLINE</div>
        <button class="tb-plugin-btn" onclick="showPluginInfo()">Get Plugin</button>
      </div>
    </div>

    <!-- HOME -->
    <div class="page" id="homePage">
      <div class="float-cards">
        <div class="float-card fc1"><div class="fc-inner">🎮</div></div>
        <div class="float-card fc2"><div class="fc-inner">⚔️</div></div>
        <div class="float-card fc3"><div class="fc-inner">🤖</div></div>
        <div class="float-card fc4"><div class="fc-inner">🏆</div></div>
        <div class="float-card fc5"><div class="fc-inner">🗺️</div></div>
      </div>
      <div class="home-center">
        <div class="home-title">Describe a <span>Roblox script</span>...</div>
        <div class="home-sub">Powered by Groq AI • Free • Instant</div>
        <div class="home-input-wrap">
          <input class="home-input" id="homeInput" placeholder="e.g. make me a beautiful admin console with fly, speed, god mode..." autocomplete="off">
          <button class="home-send" onclick="homeSubmit()">➤</button>
        </div>
        <div class="home-chips">
          <span class="home-chip" onclick="startChat('make a double jump with particle effects')">Double Jump</span>
          <span class="home-chip" onclick="startChat('beautiful admin console fly speed god mode kick')">Admin Console</span>
          <span class="home-chip" onclick="startChat('animated shop GUI with coins and buy buttons')">Shop GUI</span>
          <span class="home-chip" onclick="startChat('sword combat system with combos and effects')">Combat</span>
          <span class="home-chip" onclick="startChat('enemy NPC that chases and attacks players')">Enemy NPC</span>
          <span class="home-chip" onclick="startChat('leaderboard with kills coins DataStore')">Leaderboard</span>
        </div>
      </div>
    </div>

    <!-- CHAT -->
    <div class="page hidden" id="chatPage">
      <div class="chat-msgs" id="chatMsgs"></div>
      <div class="chat-input-area">
        <div class="chat-input-wrap">
          <textarea class="chat-input" id="chatInput" placeholder="Tell me what you want to build..." rows="1"></textarea>
          <button class="chat-send" onclick="sendMsg()">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const SERVER = 'https://enesai.onrender.com/api/generate';
let waitingConfirm=false, pendingPrompt='', pendingMode='', recentHistory=[];

// ── KEY SYSTEM ──
function generateKey() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  const s = () => Array.from({length:4}, () => c[Math.floor(Math.random()*c.length)]).join('');
  return `ENES-${s()}-${s()}-${s()}`;
}

// Auto generate or load saved key
let myKey = localStorage.getItem('enesai_key_v4');
if(!myKey || !myKey.startsWith('ENES-')) {
  myKey = generateKey();
  localStorage.setItem('enesai_key_v4', myKey);
}

// Display key everywhere
function updateKeyDisplay() {
  document.getElementById('sidebarKey').textContent = myKey;
  document.getElementById('topbarKey').textContent = myKey.substring(0,9)+'...';
}
updateKeyDisplay();

function regenKey() {
  myKey = generateKey();
  localStorage.setItem('enesai_key_v4', myKey);
  updateKeyDisplay();
}

function showPluginInfo() {
  alert('Download the Enes\'s AI plugin for Roblox Studio!\n\nYour key: ' + myKey + '\n\nThe plugin uses this same key automatically.');
}

// ── PAGES ──
function showHome() {
  document.getElementById('homePage').classList.remove('hidden');
  document.getElementById('chatPage').classList.add('hidden');
}

function showChat() {
  document.getElementById('homePage').classList.add('hidden');
  document.getElementById('chatPage').classList.remove('hidden');
}

function homeSubmit() {
  const val = document.getElementById('homeInput').value.trim();
  if(!val) return;
  document.getElementById('homeInput').value = '';
  startChat(val);
}

document.getElementById('homeInput').addEventListener('keydown', e => {
  if(e.key === 'Enter') homeSubmit();
});

function startChat(prompt) {
  showChat();
  const msgs = document.getElementById('chatMsgs');
  if(msgs.children.length === 0) {
    addMsg("Hey! I'm <strong>Enes's AI</strong> 👋 I'll ask your opinion before generating anything!", false, false, false, null);
  }
  setTimeout(() => { addMsg(prompt, true, false, false, null); processMessage(prompt); }, 100);
}

// ── RECENT ──
function addToRecent(prompt) {
  recentHistory.unshift(prompt);
  if(recentHistory.length > 5) recentHistory.pop();
  const el = document.getElementById('recentList');
  el.innerHTML = recentHistory.map(p => `
    <div class="sb-item" onclick="startChat('${p.replace(/'/g,"\\'")}')">
      <span class="sb-item-icon">💬</span>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;">${p.substring(0,22)}...</span>
    </div>
  `).join('');
}

// ── AI ──
function detectMode(p) {
  const t = p.toLowerCase();
  if(t.includes('gui')||t.includes('shop')||t.includes('inventory')||t.includes('hud')||t.includes('menu')||t.includes('button')) return 'GUI';
  if(t.includes('admin')||t.includes('console')||t.includes('command')) return 'Admin';
  if(t.includes('combat')||t.includes('sword')||t.includes('weapon')||t.includes('gun')||t.includes('fight')||t.includes('damage')) return 'Combat';
  if(t.includes('npc')||t.includes('enemy')||t.includes('mob')||t.includes('chase')||t.includes('zombie')) return 'NPC';
  if(t.includes('datastore')||t.includes('save')||t.includes('leaderboard')) return 'DataStore';
  if(t.includes('module')||t.includes('library')) return 'Module';
  if(t.includes('server')||t.includes('remote')) return 'Script';
  return 'LocalScript';
}

function isScriptRequest(msg) {
  return ['make','create','build','write','generate','script','gui','i want','i need','do a','can you','give me','add'].some(k => msg.toLowerCase().includes(k));
}

function buildSystem(mode) {
  const map = {
    LocalScript:"Generate a Roblox LOCALSCRIPT. Use game.Players.LocalPlayer and :WaitForChild('PlayerGui'). Client-side only.",
    GUI:"Generate a Roblox LOCALSCRIPT with beautiful neon dark UI. Use Instance.new(), UICorner, UIGradient, TweenService. Parent ScreenGui to PlayerGui.",
    Combat:"Generate a Roblox LOCALSCRIPT for combat. Hit detection, RemoteEvents, visual effects.",
    Script:"Generate a Roblox server SCRIPT. Server-side only.",
    NPC:"Generate a Roblox server SCRIPT for NPC with PathfindingService and attack logic.",
    DataStore:"Generate a Roblox server SCRIPT using DataStoreService with pcall.",
    Module:"Generate a Roblox MODULESCRIPT returning a clean table/class.",
    Admin:"Generate a Roblox LOCALSCRIPT for a beautiful neon admin console. Commands: fly, speed, god, kick, teleport, heal, invisible, noclip.",
  };
  return "You are Enes's AI, expert Roblox Lua scripter. "+(map[mode]||map.LocalScript)+" Add clear comments. Use task.wait() and task.spawn(). Use pcall() for error handling. CRITICAL: Output ONLY raw Lua code. No markdown. No backticks. Start code directly.";
}

function addMsg(content, isUser, isCode, showConfirm, originalPrompt) {
  const msgs = document.getElementById('chatMsgs');
  const div = document.createElement('div');
  div.className = 'msg '+(isUser?'user':'ai');
  const av = document.createElement('div');
  av.className = 'msg-av';
  av.textContent = isUser ? '>' : '⚡';
  const body = document.createElement('div');
  body.className = 'msg-body';

  if(isCode) {
    const code = document.createElement('div');
    code.className = 'msg-code';
    code.textContent = content;
    body.appendChild(code);
  } else {
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = content;
    body.appendChild(bubble);
  }

  if(showConfirm && originalPrompt) {
    const btns = document.createElement('div');
    btns.className = 'confirm-btns';
    const yes = document.createElement('button');
    yes.className='cbtn cbtn-yes'; yes.textContent='✓ Yes, do it!';
    yes.onclick = () => { btns.remove(); waitingConfirm=false; generateScript(originalPrompt, pendingMode); };
    const no = document.createElement('button');
    no.className='cbtn cbtn-no'; no.textContent='✗ No';
    no.onclick = () => { btns.remove(); waitingConfirm=false; addMsg("No problem! What else do you need? 😊",false,false,false,null); };
    const mod = document.createElement('button');
    mod.className='cbtn cbtn-mod'; mod.textContent='✎ Modify';
    mod.onclick = () => { btns.remove(); waitingConfirm=false; addMsg("Sure! Tell me what to change 👇",false,false,false,null); document.getElementById('chatInput').focus(); };
    btns.append(yes,no,mod);
    body.appendChild(btns);
    waitingConfirm = true;
  }

  div.append(av, body);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('chatMsgs');
  const div = document.createElement('div');
  div.className='msg ai'; div.id='typing';
  const av = document.createElement('div'); av.className='msg-av'; av.textContent='⚡';
  const t = document.createElement('div'); t.className='typing';
  for(let i=0;i<3;i++){const d=document.createElement('div');d.className='td';t.appendChild(d);}
  div.append(av,t); msgs.appendChild(div); msgs.scrollTop=msgs.scrollHeight;
}

function removeTyping(){const el=document.getElementById('typing');if(el)el.remove();}

async function generateScript(prompt, mode) {
  showTyping();
  addToRecent(prompt);
  try {
    const res = await fetch(SERVER, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({prompt, mode, key: myKey, system: buildSystem(mode)})
    });
    const data = await res.json();
    const code = data.code || '-- No code returned';
    removeTyping();
    addMsg(code, false, true, false, null);
    const lines = code.split('\n').length;
    setTimeout(() => { addMsg(`✅ Done! <strong>${lines} lines</strong> of ${mode} code.<br><br>Copy and paste into Roblox Studio. Want changes?`, false, false, false, null); }, 300);
  } catch(e) {
    removeTyping();
    addMsg('❌ Could not reach server. Try again!', false, false, false, null);
  }
}

async function chatWithAI(prompt) {
  showTyping();
  try {
    const res = await fetch(SERVER, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({prompt, mode:'chat', key: myKey, system:"You are Enes's AI, a friendly Roblox scripting assistant. Answer clearly. No markdown."})
    });
    const data = await res.json();
    removeTyping();
    addMsg(data.code || 'Could not get a response!', false, false, false, null);
  } catch(e) {
    removeTyping();
    addMsg('❌ Could not reach server!', false, false, false, null);
  }
}

async function processMessage(msg) {
  if(isScriptRequest(msg)) {
    pendingPrompt = msg;
    pendingMode = detectMode(msg);
    showTyping();
    await new Promise(r => setTimeout(r, 700));
    removeTyping();
    addMsg(`Got it! Detected as <strong>${pendingMode}</strong>.<br><br>You want: "<em>${msg}</em>"<br><br>Should I go ahead? 👇`, false, false, true, msg);
  } else {
    chatWithAI(msg);
  }
}

async function sendMsg() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if(!msg || waitingConfirm) return;
  input.value = ''; input.style.height = 'auto';
  addMsg(msg, true, false, false, null);
  processMessage(msg);
}

const chatInput = document.getElementById('chatInput');
chatInput.addEventListener('input', () => { chatInput.style.height='auto'; chatInput.style.height=Math.min(chatInput.scrollHeight,120)+'px'; });
chatInput.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} });
</script>
